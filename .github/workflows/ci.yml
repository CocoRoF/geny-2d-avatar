name: ci

on:
  push:
    branches: [main]
  pull_request:

# 동일 브랜치의 연속 푸시 시 이전 실행 자동 취소 — 리소스 절약.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden:
    name: golden regression (schemas + exporter-core + bundle + UI)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build exporter-core
        run: pnpm -F @geny/exporter-core build

      - name: Golden regression
        run: pnpm run test:golden

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          VERSION=8.21.2
          curl -sSLo gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --no-git \
            --redact \
            --verbose \
            --exit-code 1
