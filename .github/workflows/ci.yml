name: ci

on:
  push:
    branches: [main]
  pull_request:

# 동일 브랜치의 연속 푸시 시 이전 실행 자동 취소 — 리소스 절약.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden:
    name: golden regression (schemas + exporter-core + bundle)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build exporter-core
        run: pnpm -F @geny/exporter-core build

      - name: Golden regression
        run: pnpm run test:golden

  bullmq-integration:
    # 세션 69 — ADR 0006 §D3 X+4 staging. `@geny/job-queue-bullmq/tests/redis-integration.test.ts`
    # 는 `REDIS_URL` 미설정 시 4 test skip (Foundation CI 기본 경로). 본 lane 만 redis 서비스
    # 컨테이너를 띄워 테스트 포인트 1/2/3/getJob-null + close 멱등을 실 Redis 에서 회귀한다.
    # golden lane 과 병렬 — 실패해도 golden 이 막히지 않음 (독립 job).
    name: bullmq integration (redis 7.2-alpine)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis:7.2-alpine
        # BullMQ 는 noeviction 정책에서만 큐 안정성이 보장됨 (ADR 0006 §1.2). redis:7.2-alpine
        # 기본은 maxmemory 미설정 + noeviction 이지만, --maxmemory-policy 를 명시해 의도를 코드화.
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install redis-cli
        # GitHub Actions ubuntu runner 호스트에는 redis-cli 가 기본 설치돼 있지 않음.
        # service container 안에 있는 redis-cli 를 쓰려면 `docker exec` 우회가 필요한데, apt 로
        # redis-tools 를 설치하는 쪽이 단순. 설치만 하고 서버는 service container 가 담당.
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends redis-tools
          redis-cli --version

      - name: Enforce noeviction policy
        # Redis service container 는 `options` 에서 CMD 를 직접 덮지 못함 (BullMQ 가 `config SET`
        # 으로 런타임 변경 거부하는 케이스 방어). 세팅은 기본값 확인만 — 어긋나면 실패.
        run: |
          set -euo pipefail
          policy=$(redis-cli -u "$REDIS_URL" config get maxmemory-policy | tail -n1)
          echo "maxmemory-policy=$policy"
          test "$policy" = "noeviction"

      - name: Build dependencies
        # job-queue-bullmq 의 tsc 는 `@geny/ai-adapter-core` 의 dist/*.d.ts 를 요구.
        # golden lane 은 earlier step 에서 빌드하지만 이 독립 lane 은 직접 선행 빌드.
        run: pnpm -F @geny/ai-adapter-core build

      - name: BullMQ integration tests
        run: pnpm -F @geny/job-queue-bullmq test

      - name: Build worker-generate chain
        # 세션 78 — observability-e2e 는 apps/worker-generate/dist/main.js 를 spawn.
        # orchestrator-service 는 ai-adapter-nano-banana / ai-adapters-fallback / metrics-http /
        # exporter-core / exporter-pipeline 의 dist/*.d.ts 를 tsc 시 요구 — 세션 74 golden lane
        # 순서를 이 lane 에도 복제해야 함 (독립 job, dist 캐시 공유 없음).
        run: |
          set -euo pipefail
          pnpm -F @geny/ai-adapter-nano-banana build
          pnpm -F @geny/ai-adapters-fallback build
          pnpm -F @geny/metrics-http build
          pnpm -F @geny/post-processing build
          pnpm -F @geny/exporter-core build
          pnpm -F @geny/exporter-pipeline build
          pnpm -F @geny/orchestrator-service build
          pnpm -F @geny/job-queue-bullmq build
          pnpm -F @geny/worker-generate build

      - name: Observability e2e
        id: observability-e2e
        # 세션 77 `scripts/observability-e2e.mjs` 를 `--reuse-redis` 로 구동 — service container
        # 가 이미 noeviction 정책으로 떠있으므로 docker run 단계를 건너뛰고 PING→spawn→perf-harness
        # smoke→observability-smoke validation 4단계만 돈다. 파서 단위 테스트(세션 76)는 golden
        # step 22 에서 회귀, 본 lane 은 실 Redis 에 기반한 e2e.
        run: node scripts/observability-e2e.mjs --reuse-redis --redis-url "$REDIS_URL"

      - name: Observability e2e (--vendor-mock)
        id: observability-e2e-vendor-mock
        # 세션 83 — `scripts/mock-vendor-server.mjs` 를 ephemeral port 로 기동하고 실 HTTP
        # 어댑터(HttpNanoBananaClient/HttpSDXLClient/HttpFluxFillClient) 경로로 perf-harness
        # smoke 가 흐르도록 한다. `--snapshot` 으로 fresh HTTP-path exposition 을 캡처 → 커밋된
        # Mock 베이스라인(`smoke-snapshot-session-75.txt`) 과 structural drift 가 0 임을
        # observability-snapshot-diff 로 어서션. Mock → HTTP 전환이 관측 계약을 보존한다는
        # Foundation 불변식을 실 HTTP 경로에서도 CI 회귀로 고정.
        run: |
          set -euo pipefail
          SNAP=/tmp/obs-http-fresh.txt
          node scripts/observability-e2e.mjs --reuse-redis --redis-url "$REDIS_URL" \
            --vendor-mock --snapshot "$SNAP" \
            --queue-name geny-obs-83 --producer-port 9093 --consumer-port 9094 \
            --log-dir artifacts/observability-e2e-vendor-mock
          node scripts/observability-snapshot-diff.mjs \
            --baseline infra/observability/smoke-snapshot-session-75.txt \
            --current "$SNAP"

      - name: Observability e2e (--vendor-mock fallback 경로)
        id: observability-e2e-fallback
        # 세션 84 — nano-banana=1.0 / sdxl=0 / flux=0 per-endpoint fail-rate 로 mock-vendor 를
        # 기동해 라우터가 20 잡 전부 nano-banana 에서 실패→sdxl 폴백→성공하도록 강제. fresh
        # exposition 을 캡처 → `observability-fallback-validate.mjs` 가 커밋된 fallback
        # 베이스라인(`smoke-snapshot-fallback-session-84.txt`) 과 동일한 5 축을 만족하는지 검사.
        # Foundation "fallback 경로가 관측 상 없었던 일이 되지 않는다" 불변식을 실시간 캡처에서도
        # CI 회귀로 고정 — golden step 27 은 커밋된 파일만 검증하므로 orchestration 변조 탐지는
        # 본 lane 담당.
        run: |
          set -euo pipefail
          SNAP=/tmp/obs-fallback-fresh.txt
          node scripts/observability-e2e.mjs --reuse-redis --redis-url "$REDIS_URL" \
            --vendor-mock --mock-fail-rate-generate 1 --mock-fail-rate-edit 0 --mock-fail-rate-fill 0 \
            --snapshot "$SNAP" \
            --queue-name geny-obs-84 --producer-port 9095 --consumer-port 9096 \
            --log-dir artifacts/observability-e2e-fallback
          node scripts/observability-fallback-validate.mjs --file "$SNAP" --verbose

      - name: Observability e2e (--vendor-mock 2-hop fallback)
        id: observability-e2e-2hop
        # 세션 85 — nano=1.0 / sdxl=1.0 / flux=0 per-endpoint fail-rate + `--harness-capability-required ""`
        # (capability=[]) + `--harness-with-mask` 조합으로 20 잡 전부 nano-banana→sdxl→flux-fill 2-hop
        # 폴백 후 성공 강제. route-with-fallback 은 routing_weight desc 정렬로 [nano(100), sdxl(80),
        # flux-fill(70)] 을 후보 리스트로 만들고, flux-fill 은 capability=[mask] 라 task 에 mask_sha256/
        # reference_image_sha256 이 있어야 eligible + generate() 검증 통과. 두 조건이 결합해야 2-hop
        # 체인이 deterministic 하게 flux-fill 에서 성공 종료된다. 커밋된 베이스라인
        # `smoke-snapshot-fallback-session-85-2hop.txt` 는 골든 step 27 이 file-level 로 검증하고,
        # 본 lane 은 fresh 캡처 → `--expect-hops 2` 로 7 축(1-hop 5 축 + hop2 fallback_total +
        # sdxl 5xx call_total) 회귀. Foundation "2-hop 체인도 관측 계약에 나타난다" 불변식 CI 고정.
        run: |
          set -euo pipefail
          SNAP=/tmp/obs-2hop-fresh.txt
          node scripts/observability-e2e.mjs --reuse-redis --redis-url "$REDIS_URL" \
            --vendor-mock --mock-fail-rate-generate 1 --mock-fail-rate-edit 1 --mock-fail-rate-fill 0 \
            --harness-capability-required "" --harness-with-mask \
            --snapshot "$SNAP" \
            --queue-name geny-obs-85 --producer-port 9097 --consumer-port 9098 \
            --log-dir artifacts/observability-e2e-2hop
          node scripts/observability-fallback-validate.mjs --file "$SNAP" --expect-hops 2 --verbose

      - name: Upload observability-e2e artifacts on failure
        # 세션 79 — e2e 실패 시 producer/consumer/perf-harness/observability-smoke 로그를 artifact
        # 로 보존. 이전에는 stderr tail 800자만 노출돼 CI log 만으론 원인 분석이 불충분했다.
        # 성공 시엔 artifact 를 만들지 않음 (노이즈 방지) — 업스트림에서 snapshot 수집이 필요하면
        # 별도 `--snapshot` 플래그 경로로 분리.
        if: failure() && (steps.observability-e2e.conclusion == 'failure' || steps.observability-e2e-vendor-mock.conclusion == 'failure' || steps.observability-e2e-fallback.conclusion == 'failure' || steps.observability-e2e-2hop.conclusion == 'failure')
        uses: actions/upload-artifact@v4
        with:
          name: observability-e2e-logs
          path: |
            artifacts/observability-e2e/
            artifacts/observability-e2e-vendor-mock/
            artifacts/observability-e2e-fallback/
            artifacts/observability-e2e-2hop/
          if-no-files-found: warn
          retention-days: 7

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          VERSION=8.21.2
          curl -sSLo gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --no-git \
            --redact \
            --verbose \
            --exit-code 1
