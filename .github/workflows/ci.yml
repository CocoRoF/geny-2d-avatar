name: ci

on:
  push:
    branches: [main]
  pull_request:

# 동일 브랜치의 연속 푸시 시 이전 실행 자동 취소 — 리소스 절약.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden:
    name: golden regression (schemas + exporter-core + bundle)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build exporter-core
        run: pnpm -F @geny/exporter-core build

      - name: Golden regression
        run: pnpm run test:golden
