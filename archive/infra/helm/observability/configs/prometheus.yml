# Prometheus scrape config (dev 샘플).
#
# - 환경별 override 는 Helm values 계층에서 관리 (prometheus.{staging,prod}.yml — 세션 17 범위 밖).
# - 모든 job 은 `geny_` 접두어 메트릭을 `/metrics` 경로로 노출한다 (metrics-catalog.md).
# - dev 는 static_configs 로 충분. prod 는 kubernetes_sd_configs + service monitor 로 전환 예정.
# - 외부 라벨(cluster/environment) 은 Cortex/Thanos 멀티테넌시 대비.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: geny-dev
    environment: dev

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # Alertmanager 배포 시 교체. dev 에서는 미배포 — 룰 평가만 수행.
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: geny-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080
        labels:
          service: api

  - job_name: geny-orchestrator
    metrics_path: /metrics
    static_configs:
      - targets:
          - orchestrator:8080
        labels:
          service: orchestrator

  - job_name: geny-worker-cpu
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker-cpu:8080
        labels:
          service: worker
          worker_kind: cpu

  - job_name: geny-worker-gpu
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker-gpu:8080
        labels:
          service: worker
          worker_kind: gpu

  - job_name: geny-worker-ai
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker-ai:8080
        labels:
          service: worker
          worker_kind: ai

  - job_name: geny-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - exporter:8080
        labels:
          service: exporter
