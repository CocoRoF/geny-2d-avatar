{{- if .Values.prometheus.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "geny-observability.prometheusFullname" . }}
  labels:
    {{- include "geny-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "geny-observability.prometheusFullname" . }}
  labels:
    {{- include "geny-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  type: {{ .Values.prometheus.service.type }}
  ports:
    - port: {{ .Values.prometheus.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "geny-observability.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "geny-observability.prometheusFullname" . }}
  labels:
    {{- include "geny-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "geny-observability.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: prometheus
  template:
    metadata:
      labels:
        {{- include "geny-observability.labels" . | nindent 8 }}
        app.kubernetes.io/component: prometheus
      annotations:
        checksum/config: {{ .Files.Get "configs/prometheus.yml" | sha256sum }}
        checksum/rules: {{ .Files.Get "configs/alerts.yml" | sha256sum }}
    spec:
      serviceAccountName: {{ include "geny-observability.prometheusFullname" . }}
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.prometheus.image.pullPolicy }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          {{- range .Values.prometheus.extraArgs }}
            - {{ . | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: rules
              mountPath: /etc/prometheus/rules
            - name: storage
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: {{ include "geny-observability.prometheusFullname" . }}-config
        - name: rules
          configMap:
            name: {{ include "geny-observability.prometheusFullname" . }}-rules
        - name: storage
          {{- if .Values.prometheus.storage.emptyDir }}
          emptyDir: {}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "geny-observability.prometheusFullname" . }}
          {{- end }}
{{- if not .Values.prometheus.storage.emptyDir }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "geny-observability.prometheusFullname" . }}
  labels:
    {{- include "geny-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.prometheus.storage.size }}
{{- end }}
{{- end }}
