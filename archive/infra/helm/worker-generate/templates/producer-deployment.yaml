{{- if .Values.producer.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "geny-worker-generate.producerFullname" . }}
  labels:
    {{- include "geny-worker-generate.labels" . | nindent 4 }}
    app.kubernetes.io/component: producer
spec:
  replicas: {{ .Values.producer.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "geny-worker-generate.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: producer
  template:
    metadata:
      labels:
        {{- include "geny-worker-generate.labels" . | nindent 8 }}
        app.kubernetes.io/component: producer
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker-generate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --role
            - {{ .Values.producer.role | quote }}
            - --port
            - {{ .Values.producer.port | quote }}
            - --host
            - "0.0.0.0"
            {{- include "geny-worker-generate.commonArgs" . | nindent 12 }}
            {{- range .Values.producer.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            {{- include "geny-worker-generate.commonEnv" . | nindent 12 }}
          {{- with include "geny-worker-generate.envFrom" . }}
          envFrom:
            {{- . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.producer.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.producer.resources | nindent 12 }}
          {{- with include "geny-worker-generate.catalogVolumeMount" . }}
          volumeMounts:
            {{- . | nindent 12 }}
          {{- end }}
      {{- with include "geny-worker-generate.catalogVolume" . }}
      volumes:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with .Values.producer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.producer.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.producer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
