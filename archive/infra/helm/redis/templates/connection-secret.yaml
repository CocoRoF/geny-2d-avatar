{{/*
  consumer (worker-generate) 가 valueFrom.secretKeyRef 로 참조할 접속 Secret.
  - mode=external + external.existingSecret 비어있으면: values 의 url 을 Secret 으로 렌더 (평문 위험 — dev 전용).
  - mode=external + external.existingSecret 지정: 아예 렌더하지 않고 해당 Secret 재사용 가정.
  - mode=in-cluster: in-cluster URL 을 Secret 으로 렌더하여 consumer chart 에서 동일 계약으로 참조.
*/}}
{{- if and (eq .Values.mode "external") .Values.external.existingSecret -}}
{{/* external + existingSecret: 렌더하지 않음 — 외부 Secret 재사용 */}}
{{- else -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "geny-redis.connectionSecretName" . }}
  labels:
    {{- include "geny-redis.labels" . | nindent 4 }}
    app.kubernetes.io/component: connection
type: Opaque
stringData:
  {{- if eq .Values.mode "external" }}
  {{ .Values.connectionSecret.urlKey }}: {{ .Values.external.url | quote }}
  {{- else }}
  {{ .Values.connectionSecret.urlKey }}: {{ include "geny-redis.inClusterUrl" . | quote }}
  {{- end }}
{{- end }}
