{{- if .Values.prometheus.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "geny-observability.prometheusFullname" . }}-config
  labels:
    {{- include "geny-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |-
{{ .Files.Get "configs/prometheus.yml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "geny-observability.prometheusFullname" . }}-rules
  labels:
    {{- include "geny-observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  alerts.yml: |-
{{ .Files.Get "configs/alerts.yml" | indent 4 }}
{{- end }}
