# prod 환경 override — PVC storage, 실 알람 채널 placeholder (Secret 으로 교체).
prometheus:
  storage:
    emptyDir: false
    size: 200Gi
  retention: 30d
  extraArgs:
    - "--storage.tsdb.retention.time=30d"
    - "--storage.tsdb.retention.size=180GB"
    - "--web.enable-lifecycle"
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 16Gi

alertmanager:
  receivers:
    # 실 키는 external-secrets / SealedSecret 로 주입. 이 값은 렌더 유효성 검증용 placeholder.
    pagerduty:
      serviceKey: "SECRET_PAGERDUTY_KEY"
    slack:
      apiUrl: "SECRET_SLACK_WEBHOOK"
      channel: "#oncall-geny"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

grafana:
  adminPassword: "SECRET_GRAFANA_ADMIN"
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
