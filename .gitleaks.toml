# Gitleaks 설정 — Geny 2D Avatar
#
# 목적: Ed25519 서명 fixture (RFC 8032 §7.1 Test 1 공개 벡터) 를 정상 통과시키고,
#      그 외 실키/토큰이 커밋에 포함되는 것을 차단.
#
# 참고: https://github.com/gitleaks/gitleaks
# 세션 48 — Foundation Exit #2 릴리스 게이트(보안 스캔).

title = "geny-2d-avatar gitleaks"

[extend]
useDefault = true

[allowlist]
description = "RFC 8032 Test 1 public fixture + signed sample license/provenance"

# 파일 경로 기반 허용 (아래 경로의 모든 매치 무시)
paths = [
  # RFC 8032 Test 1 공개 벡터로 서명된 샘플 라이선스/프로비넌스.
  # `signature: "ed25519:<b64url>"` 가 high-entropy 로 오탐될 수 있음.
  '''samples/avatars/sample-[0-9]+-[^/]+\.license\.json$''',
  '''samples/avatars/sample-[0-9]+-[^/]+\.provenance\.json$''',

  # 레지스트리/서명 헬퍼에 RFC 8032 벡터가 하드코드 — 테스트 전용.
  '''infra/registry/signer-keys\.json$''',
  '''scripts/sign-fixture\.mjs$''',

  # Ed25519 서명 라운드트립 테스트 (동일 벡터 사용).
  '''packages/license-verifier/tests/.*''',
  '''packages/ai-adapter-nano-banana/tests/provenance-roundtrip\.test\.ts$''',

  # BullMQ idempotency_key fixture (세션 70 schema narrow 후 `abc.123.def_456-789`
  # entropy 가 generic-api-key 임계 초과). 테스트 상수 — 실키 아님.
  '''packages/job-queue-bullmq/tests/.*\.test\.ts$''',

  # pnpm lockfile 은 base64 integrity 해시 덩어리라 generic-entropy 로 걸림.
  '''pnpm-lock\.yaml$''',

  # 문서류는 RFC 8032 fixture key 나 "trust=fixture" 예제 CLI 출력이 포함돼 있음. 실키가
  # 실수로 섞이면 소스/테스트 파일에서 잡아야 하므로 문서 경로만 allowlist (세션 70 복구).
  '''packages/license-verifier/README\.md$''',
  '''scripts/README\.md$''',

  # 2026-04-24 스코프 리셋 — 구 progress/sessions/ 는 archive/progress_old/sessions/ 로 이동.
  # 신규 기여는 이 경로에 추가되지 않으므로 실 유출 위험 無. 기록 보존 위한 allowlist.
  '''archive/.*\.md$''',
]

# 값 기반 허용 (IETF 공식 테스트 벡터 고정 핵사값)
regexes = [
  # RFC 8032 §7.1 Test 1 seed (private half of the keypair — 표준 공개값)
  '''9d61b19deffd5a60ba844af492ec2cc44449c5697b326919703bac031cae7f60''',
  # RFC 8032 §7.1 Test 1 public key
  '''d75a980182b10ab7d54bfed3c964073a0ee172f3daa62325af021a68f707511a''',
]
