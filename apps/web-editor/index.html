<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Geny 2D Avatar В· Foundation Editor</title>
    <style>
      :root {
        color-scheme: light dark;
        --border: #d9dde3;
        --border-soft: #eceef2;
        --muted: #6b7280;
        --accent: #2b4a8b;
        --accent-soft: #eef4ff;
        --bg-panel: #ffffff;
        --bg-page: #f7f8fa;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --border: #2d3138;
          --border-soft: #23262b;
          --muted: #9aa1ad;
          --accent: #a9c4ff;
          --accent-soft: #1b2236;
          --bg-panel: #16181d;
          --bg-page: #0e1014;
        }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg-page); }
      body { display: grid; grid-template-rows: auto auto 1fr; font-size: 14px; line-height: 1.45; }

      /* ОІ P2-S1 вҖ” Generate bar: н”„лЎ¬н”„нҠё вҶ’ мӢӨ м•„л°”нғҖ л ҢлҚ” */
      .generate-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-panel);
      }
      .generate-bar label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .generate-bar input[type="text"] {
        flex: 1;
        min-width: 180px;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg-page);
        color: inherit;
        font-size: 13px;
      }
      .generate-bar button.generate {
        padding: 6px 14px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      .generate-bar button.generate[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .generate-bar .gen-status {
        min-width: 120px;
        font-size: 12px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .generate-bar .gen-pills {
        display: flex;
        gap: 4px;
      }
      .generate-bar .gen-pill {
        width: 28px;
        height: 6px;
        border-radius: 3px;
        background: var(--border-soft);
        transition: background 0.15s;
      }
      .generate-bar .gen-pill[data-phase="active"] { background: var(--accent); }
      .generate-bar .gen-pill[data-phase="done"] { background: #4aa56e; }
      .generate-bar .gen-pill[data-phase="err"] { background: #c94a4a; }
      /* ОІ P2-S3 вҖ” timing breakdown: н”„лЎ¬н”„нҠёвҶ’мҠӨмҷ‘ к°Ғ phase мқҳ ms + мҙқн•© + ОІ В§7 мҳҲмӮ° н‘ңмӢң. */
      .generate-bar .gen-timing {
        display: flex;
        gap: 6px;
        font-size: 11px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .generate-bar .gen-timing .phase {
        padding: 1px 4px;
        border-radius: 3px;
        background: var(--border-soft);
      }
      .generate-bar .gen-timing .total[data-budget="ok"] { background: #2b4a39; color: #b7e4c5; }
      .generate-bar .gen-timing .total[data-budget="over"] { background: #5a2a2a; color: #f0b0b0; }

      /* TopBar */
      header.topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-panel);
      }
      .topbar .brand { font-weight: 600; letter-spacing: 0.01em; }
      .topbar .avatar-name {
        padding: 4px 10px;
        border: 1px solid var(--border-soft);
        border-radius: 6px;
        background: var(--bg-page);
        font-variant-numeric: tabular-nums;
      }
      .topbar .template-picker {
        padding: 4px 8px;
        border: 1px solid var(--border);
        background: var(--bg-panel);
        border-radius: 6px;
        font-size: 13px;
        color: inherit;
      }
      .topbar .actions { margin-left: auto; display: flex; gap: 6px; }
      .topbar button {
        padding: 4px 12px;
        border: 1px solid var(--border);
        background: var(--bg-panel);
        border-radius: 6px;
        font-size: 13px;
        color: var(--muted);
        cursor: not-allowed;
      }
      .topbar button[disabled] { opacity: 0.6; }

      /* 3-column layout */
      main.editor {
        display: grid;
        grid-template-columns: 260px 1fr 320px;
        min-height: 0;
      }
      .pane {
        border-right: 1px solid var(--border);
        background: var(--bg-panel);
        overflow-y: auto;
        min-width: 0;
      }
      .pane:last-child { border-right: none; border-left: 1px solid var(--border); }
      .pane h2 {
        margin: 0;
        padding: 10px 14px;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        border-bottom: 1px solid var(--border-soft);
        position: sticky;
        top: 0;
        background: var(--bg-panel);
        z-index: 1;
      }

      /* Parts sidebar */
      .parts-group { padding: 8px 8px 14px; }
      .parts-group .group-label {
        padding: 4px 6px;
        font-size: 0.72rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .parts-list { list-style: none; margin: 0; padding: 0; }
      .parts-list li {
        padding: 6px 8px;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }
      .parts-list li:hover { background: var(--border-soft); }
      .parts-list li[aria-selected="true"] {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .parts-list .slot-id {
        margin-left: auto;
        color: var(--muted);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }

      /* Preview Player */
      .preview {
        display: grid;
        grid-template-rows: 1fr auto;
        background: var(--bg-page);
      }
      .stage {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .stage-inner {
        width: min(480px, 100%);
        aspect-ratio: 3 / 4;
        border: 1px solid var(--border);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-panel);
        color: var(--muted);
        font-size: 0.85rem;
        text-align: center;
        padding: 8px;
        position: relative;
      }
      .stage-inner svg[data-testid="structure-preview"] {
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 1;
      }
      .stage-inner .pixi-mount {
        position: absolute;
        inset: 0;
        z-index: 0;
        border-radius: 12px;
        overflow: hidden;
        pointer-events: none;
      }
      .preview-controls {
        display: flex;
        gap: 10px;
        padding: 10px 16px;
        border-top: 1px solid var(--border);
        background: var(--bg-panel);
        color: var(--muted);
        font-size: 12px;
      }
      .preview-controls em { font-style: normal; }

      /* Inspector */
      .inspector-body { padding: 12px 14px; }
      .kv {
        display: grid;
        grid-template-columns: 120px 1fr;
        row-gap: 6px;
        column-gap: 10px;
        font-size: 13px;
      }
      .kv dt { color: var(--muted); }
      .kv dd { margin: 0; font-variant-numeric: tabular-nums; word-break: break-word; }
      .status {
        margin: 10px 14px;
        padding: 8px 12px;
        border-radius: 6px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
      }
      .status.ok { background: #e8f6ed; color: #205d38; }
      .status.err { background: #fbe9e9; color: #7a1f1f; }
      .empty-hint { color: var(--muted); font-size: 13px; padding: 8px 0; }

      /* м„ём…ҳ 90 вҖ” Parameters нҢЁл„җ */
      .params-section { margin-top: 16px; }
      .params-section > .section-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .param-group { margin: 0 0 10px; padding: 8px 0; border-top: 1px solid var(--border-soft); }
      .param-group:first-of-type { border-top: none; }
      .param-group .group-head {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .param-row {
        display: grid;
        grid-template-columns: 1fr 60px;
        column-gap: 8px;
        align-items: center;
        padding: 3px 0;
        font-size: 12px;
      }
      .param-row label { color: var(--muted); font-size: 11px; }
      .param-row input[type="range"] { width: 100%; }
      .param-row .readout {
        font-variant-numeric: tabular-nums;
        font-size: 11px;
        text-align: right;
        color: var(--accent);
      }

      /* м„ём…ҳ 94 вҖ” Motions / Expressions м»ЁнҠёлЎӨ */
      .playback-section { margin-top: 16px; }
      .playback-section > .section-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .playback-row { display: flex; flex-wrap: wrap; gap: 6px; }
      .playback-row button {
        padding: 4px 10px;
        border: 1px solid var(--border);
        background: var(--bg-panel);
        border-radius: 6px;
        font-size: 12px;
        color: inherit;
        cursor: pointer;
      }
      .playback-row button:hover { background: var(--accent-soft); }
      .playback-row button[aria-pressed="true"] {
        background: var(--accent-soft);
        color: var(--accent);
        border-color: var(--accent);
      }
      .playback-readout {
        margin-top: 6px;
        font-size: 11px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .playback-readout span { color: var(--accent); }
      geny-avatar { display: none; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="brand">Geny Editor</span>
      <span id="avatar-name" class="avatar-name">вҖ”</span>
      <select id="template-picker" class="template-picker" aria-label="template"></select>
      <div class="actions">
        <button disabled title="Runtime (м„ём…ҳ 82+)">Save</button>
        <button disabled title="Runtime">History</button>
        <button disabled title="Runtime">Share</button>
        <button disabled title="Runtime">Export</button>
      </div>
    </header>

    <!-- ОІ P2-S1 вҖ” Prompt вҶ’ Mock texture generator вҶ’ pixi renderer regenerate.
         `?renderer=pixi` лӘЁл“ңм—җм„ң мӢӨм ңлЎң мғҲ avatar н”Ҫм…Җмқҙ көҗмІҙлҗңлӢӨ. Mock мқҖ лёҢлқјмҡ°м Җ
         Canvas 2D лЎң кІ°м •лЎ  н…ҚмҠӨмІҳ(HSL hash(prompt+slot_id)) лҘј мғқм„ұ вҖ” мӢӨ лІӨлҚ”
         (nano-banana) нҶөн•©мқҖ ОІ P3 м—җм„ң BL-VENDOR-KEY н•ҙм ң нӣ„. -->
    <div class="generate-bar" id="generate-bar">
      <label for="prompt-input">Prompt</label>
      <input
        id="prompt-input"
        type="text"
        placeholder="мҳҲ: к°Ҳмғү лӢЁл°ң мҶҢл…Җ, л№Ёк°„ м…”мё "
        autocomplete="off"
      />
      <div class="gen-pills" aria-label="generation phases">
        <div class="gen-pill" data-pill="1" title="prompt ingest"></div>
        <div class="gen-pill" data-pill="2" title="synth textures"></div>
        <div class="gen-pill" data-pill="3" title="build atlas"></div>
        <div class="gen-pill" data-pill="4" title="swap bundle"></div>
        <div class="gen-pill" data-pill="5" title="repaint"></div>
      </div>
      <button id="generate-btn" class="generate" type="button">Generate</button>
      <span id="gen-status" class="gen-status">мӨҖл№„</span>
      <div id="gen-timing" class="gen-timing" aria-label="phase timings" hidden></div>
    </div>

    <main class="editor">
      <aside class="pane" aria-label="parts sidebar">
        <h2>Parts</h2>
        <div id="status" class="status">лЎңл”© мӨ‘вҖҰ</div>
        <div id="parts-groups"></div>
      </aside>

      <section class="preview" aria-label="preview player">
        <div class="stage">
          <div class="stage-inner" id="stage-inner">
            <div class="pixi-mount" id="pixi-mount"></div>
            <geny-avatar id="avatar"></geny-avatar>
          </div>
        </div>
        <div class="preview-controls">
          <em>Structure preview В· rotation = head_angle_x</em>
          <span style="margin-left:auto">Stage 3 вҖ” motion/expression state only (render = Runtime)</span>
        </div>
      </section>

      <aside class="pane" aria-label="inspector">
        <h2>Inspector</h2>
        <div class="inspector-body" id="inspector">
          <p class="empty-hint">нҢҢмё лҘј м„ нғқн•ҳл©ҙ slot В· role В· мҶҢмҶҚ к·ёлЈ№мқҙ н‘ңмӢңлҗ©лӢҲлӢӨ.</p>
        </div>
      </aside>
    </main>

    <!-- ОІ P1-S1 вҖ” `import("pixi.js")` лҘј vendored ESM bundle лЎң н•ҙм„қ. Default кІҪлЎңм—җм„ 
         pixi bundle мқ„ load н•ҳм§Җ м•ҠмқҢ (`?renderer=pixi` мҝјлҰ¬ мӢң dynamic import м§„мһ…). -->
    <script type="importmap">
      {
        "imports": {
          "pixi.js": "./public/vendor/pixi.min.mjs"
        }
      }
    </script>
    <script type="module" src="./public/vendor/index.js"></script>
    <script type="module">
      import { CATEGORY_ORDER, categorize, parametersForPart, buildGenerateMetricEvents } from "./public/vendor/web-editor-logic/index.js";
      import { createStructureRenderer } from "./public/vendor/web-editor-renderer/index.js";

      // м„ём…ҳ 116 вҖ” `?debug=logger` URL нҢҢлқјлҜён„°к°Җ мһҲмңјл©ҙ `@geny/web-avatar-renderer`
      // мқҳ `createLoggingRenderer` лҘј `<geny-avatar>` м—җ м¶”к°ҖлЎң attach н•ҙ ready /
      // parameterchange / destroy мқҙлІӨнҠё мҠӨнҠёлҰјмқ„ `console.debug` лЎң нқҳлҰ°лӢӨ. кё°ліё
      // кІҪлЎңм—җм„  import н•ҳм§Җ м•Ҡм•„ лҹ°нғҖмһ„ л°”мқҙнҠё л¬ҙмҰқк°Җ (dynamic import).
      const debugFlag = new URLSearchParams(location.search).get("debug") ?? "";
      const debugLoggerEnabled = debugFlag.split(",").map((s) => s.trim()).includes("logger");
      let debugLoggingRenderer = null;

      // ОІ P1-S1 вҖ” `?renderer=pixi` мҝјлҰ¬к°Җ мјңм§Җл©ҙ `@geny/web-avatar-renderer-pixi` мқҳ
      // `createPixiRenderer` лҘј `<geny-avatar>` м—җ attach н•ҙ pixi.js лЎң мӢӨ н”Ҫм…Җмқ„
      // к·ёлҰ°лӢӨ. SVG кө¬мЎ° н”„лҰ¬л·°лҠ” к·ёлҢҖлЎң мң м§Җ (interaction м „лӢҙ) вҖ” pixi мә”лІ„мҠӨлҠ”
      // кө¬мЎ° SVG л’Өм—җ absolute мҠӨнғқ. Default кІҪлЎңм—җм„  load н•ҳм§Җ м•ҠмқҢ.
      const rendererFlag = new URLSearchParams(location.search).get("renderer") ?? "";
      const pixiEnabled = rendererFlag === "pixi";
      let pixiRenderer = null;
      // ОІ P1-S6 вҖ” мҙҲкё° avatar мһҗлҸҷ мғқм„ұ н”Ңлһҳк·ё (swapTemplate м—җм„ң лҰ¬м…Ӣ вҶ’ TDZ нҡҢн”ј мң„н•ҙ мғҒлӢЁ м„ м–ё).
      let autoPreviewDone = false;

      const statusEl = document.querySelector("#status");
      const groupsEl = document.querySelector("#parts-groups");
      const inspectorEl = document.querySelector("#inspector");
      const avatarNameEl = document.querySelector("#avatar-name");
      const pickerEl = document.querySelector("#template-picker");
      const el = document.querySelector("#avatar");
      const stageEl = document.querySelector("#stage-inner");

      // м„ём…ҳ 91 вҖ” кө¬мЎ° н”„лҰ¬л·° л ҢлҚ”лҹ¬ мһҘм°©. `<geny-avatar>` мқҳ ready + parameterchange
      // мқҙлІӨнҠёлҘј кө¬лҸ…н•ҙ SVG лЎң нҢҢмё  к·ёлҰ¬л“ңлҘј к·ёлҰ°лӢӨ. Cubism/WebGL мӢӨ л ҢлҚ”лҹ¬лҠ” нӣ„мҶҚ.
      // м„ём…ҳ 92 вҖ” onSelectPart мҪңл°ұмңјлЎң Preview нҒҙлҰӯ вҶ’ мӮ¬мқҙл“ңл°” м„ нғқ м–‘л°©н–Ҙ л°”мқёл”©.
      // partNodeBySlot мқҖ нҢҢмё  li DOM мқ„ slot_id вҶ’ л…ёл“ңлЎң м—ӯмЎ°нҡҢн•ҳлҠ” л§ө.
      const partNodeBySlot = new Map();
      const renderer = createStructureRenderer({
        element: el,
        mount: stageEl,
        onSelectPart: (part) => {
          if (!part) {
            clearSidebarSelection();
            renderParametersFor(null);
            renderInspectorEmpty();
            return;
          }
          const entry = partNodeBySlot.get(part.slot_id);
          if (entry) selectSidebarEntry(entry.li, entry.part, entry.cat, { fromRenderer: true });
        },
      });

      // ОІ P1-S1 вҖ” `?renderer=pixi` кІҪлЎңм—җм„ңл§Ң dynamic import. pixi.js + ліё нҢЁнӮӨм§Җ
      // лӘЁл‘җ vendored ESM лІҲл“Ө / importmap мңјлЎң н•ҙм„қлҗЁ. м—җл””н„° ліём—°мқҖ мӢӨнҢЁн•ҙлҸ„
      // лҸҷмһ‘н•ҳлҸ„лЎқ catch нӣ„ silent skip.
      if (pixiEnabled) {
        const pixiMountEl = document.querySelector("#pixi-mount");
        import("./public/vendor/web-avatar-renderer-pixi/index.js")
          .then(({ createPixiRenderer }) => {
            pixiRenderer = createPixiRenderer({ element: el, mount: pixiMountEl });
            console.info("[geny-avatar/pixi] attached via ?renderer=pixi");
          })
          .catch((err) => {
            console.warn("[geny-avatar/pixi] dynamic import failed", err);
          });
      }

      // м„ём…ҳ 116 вҖ” `?debug=logger` кІҪлЎңм—җм„ңл§Ң dynamic import. мӢӨнҢЁн•ҙлҸ„ м—җл””н„° ліём—°мқҖ
      // лҸҷмһ‘н•ҙм•ј н•ҳлҜҖлЎң catch л§Ң н•ҙл‘җкі  мЎ°мҡ©нһҲ skip (dev нҺёмқҳмҡ© мҠӨмң„м№ҳ).
      if (debugLoggerEnabled) {
        import("./public/vendor/web-avatar-renderer/index.js")
          .then(({ createLoggingRenderer }) => {
            debugLoggingRenderer = createLoggingRenderer({
              element: el,
              logger: (event) => {
                // кө¬лі„ к°ҖлҠҘн•ң prefix лЎң м—”м§„ лЎңк·ё / лӢӨлҘё console л©”мӢңм§ҖмҷҖ м„һмқҙм§Җ м•ҠкІҢ.
                console.debug("[geny-avatar/logger]", event);
              },
            });
            console.info("[geny-avatar/logger] attached via ?debug=logger");
          })
          .catch((err) => {
            console.warn("[geny-avatar/logger] dynamic import failed", err);
          });
      }

      function renderParts(groups) {
        groupsEl.replaceChildren();
        partNodeBySlot.clear();
        for (const cat of [...CATEGORY_ORDER, ...[...groups.keys()].filter((c) => !CATEGORY_ORDER.includes(c))]) {
          const items = groups.get(cat);
          if (!items) continue;
          const wrap = document.createElement("div");
          wrap.className = "parts-group";
          const label = document.createElement("div");
          label.className = "group-label";
          label.textContent = `${cat} В· ${items.length}`;
          wrap.appendChild(label);
          const ul = document.createElement("ul");
          ul.className = "parts-list";
          for (const p of items) {
            const li = document.createElement("li");
            li.dataset.slotId = p.slot_id;
            li.dataset.role = p.role;
            li.dataset.category = cat;
            const role = document.createElement("span");
            role.textContent = p.role;
            const slot = document.createElement("span");
            slot.className = "slot-id";
            slot.textContent = p.slot_id;
            li.append(role, slot);
            li.addEventListener("click", () => selectSidebarEntry(li, p, cat, { fromRenderer: false }));
            ul.appendChild(li);
            partNodeBySlot.set(p.slot_id, { li, part: p, cat });
          }
          wrap.appendChild(ul);
          groupsEl.appendChild(wrap);
        }
      }

      function clearSidebarSelection() {
        document.querySelectorAll('.parts-list li[aria-selected="true"]').forEach((n) =>
          n.setAttribute("aria-selected", "false"),
        );
      }

      // м„ём…ҳ 92 вҖ” лӢЁмқј м§„мһ…м җ. мӮ¬мқҙл“ңл°” нҒҙлҰӯмқҖ fromRenderer=false лЎң renderer м—җкІҢ м„ нғқмқ„
      // л°Җм–ҙл„Јкі , Preview нҒҙлҰӯ (onSelectPart) мқҖ fromRenderer=true лЎң мӮ¬мқҙл“ңл°”л§Ң к°ұмӢ н•ҙ
      // echo лЈЁн”„лҘј м°ЁлӢЁ. `renderer.setSelectedSlot` мқҖ мҪңл°ұмқ„ нҳём¶ңн•ҳм§Җ м•ҠмңјлҜҖлЎң лЈЁн”„ м—ҶмқҢ.
      // м„ём…ҳ 95 вҖ” м„ нғқ мӢң Inspector нҢҢлқјлҜён„° нҢЁл„җмқ„ м„ нғқлҗң нҢҢмё  кё°мӨҖмңјлЎң н•„н„° мһ¬л№Ңл“ң.
      function selectSidebarEntry(node, part, cat, { fromRenderer }) {
        clearSidebarSelection();
        node.setAttribute("aria-selected", "true");
        renderParametersFor(part);
        renderInspector(part, cat);
        if (!fromRenderer) renderer.setSelectedSlot(part.slot_id);
      }

      function renderInspector(part, cat) {
        inspectorEl.replaceChildren();
        const dl = document.createElement("dl");
        dl.className = "kv";
        for (const [k, v] of [
          ["slot_id", part.slot_id],
          ["role", part.role],
          ["category", cat],
        ]) {
          const dt = document.createElement("dt");
          dt.textContent = k;
          const dd = document.createElement("dd");
          dd.textContent = v;
          dl.append(dt, dd);
        }
        inspectorEl.appendChild(dl);
        const note = document.createElement("p");
        note.className = "empty-hint";
        note.textContent = "Prompt / Style Profile / Regenerate лҠ” м„ём…ҳ 82+ (Runtime) мқҙнӣ„.";
        inspectorEl.appendChild(note);
        // м„ём…ҳ 90 вҖ” Parameters мҠ¬лқјмқҙлҚ” мһ¬мЈјмһ… (inspector replaceChildren мқҙнӣ„).
        if (paramSectionEl) inspectorEl.appendChild(paramSectionEl);
        // м„ём…ҳ 94 вҖ” Motion / Expression м»ЁнҠёлЎӨ мһ¬мЈјмһ….
        if (motionSectionEl) inspectorEl.appendChild(motionSectionEl);
        if (expressionSectionEl) inspectorEl.appendChild(expressionSectionEl);
      }

      // м„ём…ҳ 90 вҖ” `<geny-avatar>` setParameter/parameterchange кі„м•Ҫмқ„ л°”мқёл”©.
      // нҢҢлқјлҜён„° 1к°ңлӢ№ input[type=range] + readout. мҠ¬лқјмқҙлҚ” вҶ’ setParameter, м—ҳлҰ¬лЁјнҠё
      // мғҒнғң вҶ’ parameterchange мқҙлІӨнҠё вҶ’ readout м—…лҚ°мқҙнҠё (нҒҙлһЁн”„ л°ҳмҳҒ).
      // м„ём…ҳ 95 вҖ” м„ нғқлҗң нҢҢмё  кё°мӨҖ м„ңлёҢм…Ӣ мһ¬л№Ңл“ң + нҳ„мһ¬ к°’ мӢңл“ң (getParameters мҠӨлғ…мғ·).
      let paramSectionEl = null;
      let allParameters = [];
      let allParameterGroups = [];
      const readoutByIdRef = new Map();

      function renderParameters(parameters, parameterGroups, opts) {
        readoutByIdRef.clear();
        const totalCount = opts?.totalCount ?? parameters.length;
        const initialValuesById = opts?.initialValuesById ?? {};
        const section = document.createElement("div");
        section.className = "params-section";
        section.dataset.testid = "parameters";
        const label = document.createElement("div");
        label.className = "section-label";
        label.textContent = totalCount > parameters.length
          ? `Parameters В· ${parameters.length} / ${totalCount}`
          : `Parameters В· ${parameters.length}`;
        section.appendChild(label);

        const groupTitleById = new Map(parameterGroups.map((g) => [g.id, g.display_name_en]));
        const byGroup = new Map();
        for (const p of parameters) {
          const key = p.group ?? "other";
          if (!byGroup.has(key)) byGroup.set(key, []);
          byGroup.get(key).push(p);
        }
        for (const [gid, rows] of byGroup) {
          const groupEl = document.createElement("div");
          groupEl.className = "param-group";
          groupEl.dataset.groupId = gid;
          const head = document.createElement("div");
          head.className = "group-head";
          head.textContent = `${groupTitleById.get(gid) ?? gid} В· ${rows.length}`;
          groupEl.appendChild(head);
          for (const p of rows) {
            const row = document.createElement("div");
            row.className = "param-row";
            row.dataset.paramId = p.id;
            const labelEl = document.createElement("label");
            labelEl.textContent = p.id;
            labelEl.htmlFor = `param-${p.id}`;
            const input = document.createElement("input");
            input.type = "range";
            input.id = `param-${p.id}`;
            input.min = String(p.range[0]);
            input.max = String(p.range[1]);
            input.step = "0.01";
            const seed = initialValuesById[p.id] ?? p.default;
            input.value = String(seed);
            input.addEventListener("input", () => {
              el.setParameter(p.id, parseFloat(input.value));
            });
            const readout = document.createElement("span");
            readout.className = "readout";
            readout.dataset.readoutId = p.id;
            readout.textContent = seed.toFixed(2);
            readoutByIdRef.set(p.id, readout);
            row.append(labelEl, input, readout);
            groupEl.appendChild(row);
          }
          section.appendChild(groupEl);
        }
        paramSectionEl = section;
      }

      // м„ём…ҳ 95 вҖ” м„ нғқлҗң нҢҢмё  кё°мӨҖ Inspector нҢҢлқјлҜён„° нҢЁл„җ мһ¬л№Ңл“ң.
      // part=null мқҙл©ҙ м „мІҙ нҢҢлқјлҜён„°(мҙҲкё° ready / м„ нғқ н•ҙм ң), м•„лӢҲл©ҙ нҢҢмё -л°”мқёл”© м„ңлёҢм…Ӣ.
      function renderParametersFor(part) {
        const subset = parametersForPart(part, allParameters);
        const initialValuesById = el.getParameters();
        renderParameters(subset, allParameterGroups, {
          totalCount: allParameters.length,
          initialValuesById,
        });
      }

      // мҙҲкё° мғҒнғң + м„ нғқ н•ҙм ң мӢң Inspector лҘј empty-hint + 3 section мңјлЎң мһ¬л°°м№ҳ.
      function renderInspectorEmpty() {
        inspectorEl.replaceChildren();
        const hint = document.createElement("p");
        hint.className = "empty-hint";
        hint.textContent = "нҢҢмё лҘј м„ нғқн•ҳл©ҙ slot В· role В· мҶҢмҶҚ к·ёлЈ№мқҙ н‘ңмӢңлҗ©лӢҲлӢӨ.";
        inspectorEl.appendChild(hint);
        if (paramSectionEl) inspectorEl.appendChild(paramSectionEl);
        if (motionSectionEl) inspectorEl.appendChild(motionSectionEl);
        if (expressionSectionEl) inspectorEl.appendChild(expressionSectionEl);
      }

      el.addEventListener("parameterchange", (ev) => {
        const readout = readoutByIdRef.get(ev.detail.id);
        if (readout) readout.textContent = ev.detail.value.toFixed(2);
      });

      // м„ём…ҳ 94 вҖ” Motion / Expression м»ЁнҠёлЎӨ. лІҲл“Ө meta мқҳ motions / expressions лҘј
      // лІ„нҠј лӘ©лЎқмңјлЎң л…ём¶ң. нҒҙлҰӯ вҶ’ `el.playMotion` / `el.setExpression` вҶ’ м—ҳлҰ¬лЁјнҠёк°Җ
      // motionstart / expressionchange мқҙлІӨнҠёлЎң мғҒнғңлҘј лёҢлЎңл“ңмәҗмҠӨнҠё вҶ’ readout лҸҷкё°.
      // мӢӨ м• лӢҲл©”мқҙм…ҳ мһ¬мғқмқҖ Runtime л ҢлҚ”лҹ¬(Cubism/WebGL) н•©лҘҳ нӣ„.
      let motionSectionEl = null;
      let expressionSectionEl = null;
      const motionButtonByPackId = new Map();
      const expressionButtonByExpId = new Map();
      let motionReadoutEl = null;
      let expressionReadoutEl = null;

      function renderMotions(motions) {
        motionButtonByPackId.clear();
        const section = document.createElement("div");
        section.className = "playback-section";
        section.dataset.testid = "motions";
        const label = document.createElement("div");
        label.className = "section-label";
        label.textContent = `Motions В· ${motions.length}`;
        section.appendChild(label);
        const row = document.createElement("div");
        row.className = "playback-row";
        for (const m of motions) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.dataset.packId = m.pack_id;
          btn.textContent = m.pack_id;
          btn.setAttribute("aria-pressed", "false");
          btn.addEventListener("click", () => el.playMotion(m.pack_id));
          row.appendChild(btn);
          motionButtonByPackId.set(m.pack_id, btn);
        }
        section.appendChild(row);
        const readout = document.createElement("div");
        readout.className = "playback-readout";
        readout.dataset.testid = "motion-readout";
        readout.innerHTML = 'current: <span data-current="motion">вҖ”</span>';
        section.appendChild(readout);
        motionReadoutEl = readout.querySelector('[data-current="motion"]');
        motionSectionEl = section;
      }

      function renderExpressions(expressions) {
        expressionButtonByExpId.clear();
        const section = document.createElement("div");
        section.className = "playback-section";
        section.dataset.testid = "expressions";
        const label = document.createElement("div");
        label.className = "section-label";
        label.textContent = `Expressions В· ${expressions.length}`;
        section.appendChild(label);
        const row = document.createElement("div");
        row.className = "playback-row";
        for (const e of expressions) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.dataset.expressionId = e.expression_id;
          btn.textContent = e.name_en;
          btn.setAttribute("aria-pressed", "false");
          btn.addEventListener("click", () => el.setExpression(e.expression_id));
          row.appendChild(btn);
          expressionButtonByExpId.set(e.expression_id, btn);
        }
        // "None" лІ„нҠј вҖ” н‘ңм • н•ҙм ң.
        const none = document.createElement("button");
        none.type = "button";
        none.dataset.expressionId = "";
        none.textContent = "None";
        none.setAttribute("aria-pressed", "true");
        none.addEventListener("click", () => el.setExpression(null));
        row.appendChild(none);
        expressionButtonByExpId.set(null, none);
        section.appendChild(row);
        const readout = document.createElement("div");
        readout.className = "playback-readout";
        readout.dataset.testid = "expression-readout";
        readout.innerHTML = 'current: <span data-current="expression">none</span>';
        section.appendChild(readout);
        expressionReadoutEl = readout.querySelector('[data-current="expression"]');
        expressionSectionEl = section;
      }

      el.addEventListener("motionstart", (ev) => {
        const packId = ev.detail.pack_id;
        for (const btn of motionButtonByPackId.values()) btn.setAttribute("aria-pressed", "false");
        const btn = motionButtonByPackId.get(packId);
        if (btn) btn.setAttribute("aria-pressed", "true");
        if (motionReadoutEl) motionReadoutEl.textContent = packId;
      });

      el.addEventListener("expressionchange", (ev) => {
        const id = ev.detail.expression_id;
        for (const btn of expressionButtonByExpId.values()) btn.setAttribute("aria-pressed", "false");
        const btn = expressionButtonByExpId.get(id);
        if (btn) btn.setAttribute("aria-pressed", "true");
        if (expressionReadoutEl) expressionReadoutEl.textContent = id ?? "none";
      });

      el.addEventListener("ready", (ev) => {
        const { manifest, meta } = ev.detail.bundle;
        statusEl.className = "status ok";
        statusEl.textContent = `ready вҖ” ${manifest.template_id}@${manifest.template_version} В· ${meta.parts.length} parts`;
        avatarNameEl.textContent = manifest.avatar_id ?? manifest.template_id;
        allParameters = meta.parameters;
        allParameterGroups = meta.parameter_groups;
        const groups = categorize(meta.parts);
        renderParts(groups);
        renderParametersFor(null);
        renderMotions(meta.motions);
        renderExpressions(meta.expressions);
        renderInspectorEmpty();
      });

      el.addEventListener("error", (ev) => {
        statusEl.className = "status err";
        statusEl.textContent = `error вҖ” ${ev.detail.error?.message ?? ev.detail.error}`;
        console.error(ev.detail.error);
      });

      function swapTemplate(bundleUrl) {
        // ОІ P1-S6 вҖ” н…ңн”ҢлҰҝ мҠӨмҷ‘ мӢң auto-preview мһ¬мӢӨн–ү н—Ҳмҡ©.
        autoPreviewDone = false;
        statusEl.className = "status";
        statusEl.textContent = "лЎңл”© мӨ‘вҖҰ";
        groupsEl.replaceChildren();
        inspectorEl.replaceChildren();
        paramSectionEl = null;
        allParameters = [];
        allParameterGroups = [];
        readoutByIdRef.clear();
        partNodeBySlot.clear();
        motionSectionEl = null;
        expressionSectionEl = null;
        motionButtonByPackId.clear();
        expressionButtonByExpId.clear();
        motionReadoutEl = null;
        expressionReadoutEl = null;
        const hint = document.createElement("p");
        hint.className = "empty-hint";
        hint.textContent = "нҢҢмё лҘј м„ нғқн•ҳл©ҙ slot В· role В· мҶҢмҶҚ к·ёлЈ№мқҙ н‘ңмӢңлҗ©лӢҲлӢӨ.";
        inspectorEl.appendChild(hint);
        el.setAttribute("src", bundleUrl);
      }

      // ОІ P2-S1 вҖ” лёҢлқјмҡ°м Җ Mock н…ҚмҠӨмІҳ мғқм„ұкё°. prompt + нҳ„мһ¬ atlas мқҳ slot UV лҘј мқҪм–ҙ
      // 2048Г—2048 Canvas мң„м—җ кІ°м •лЎ  HSL лё”лЎӯмқ„ к·ёлҰ°лӢӨ. hash(prompt + slot_id) вҶ’ hue,
      // к°ҷмқҖ prompt лҠ” н•ӯмғҒ к°ҷмқҖ мқҙлҜём§Җ. мӢӨ nano-banana кІҪлЎң(ОІ P3+) лЎң лҢҖмІҙлҗҳкё° м „к№Ңм§Җ
      // "н”„лЎ¬н”„нҠёк°Җ мӢӨм ңлЎң н”Ҫм…Җмқ„ л°”кҫјлӢӨ" лҠ” business м•ҪмҶҚмқ„ мҰқлӘ…н•ңлӢӨ.
      const MOCK_CANVAS_SIZE = 2048;

      function mockHashHue(key) {
        let h = 2166136261 >>> 0;
        for (let i = 0; i < key.length; i += 1) {
          h ^= key.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return (h >>> 0) % 360;
      }

      // ОІ P2-S2: slot_id лҘј м—ӯн•  м№ҙн…Ңкі лҰ¬лЎң л¶„лҘҳн•ҙ shape м„ нғқ. 'skin' вҶ’ лІ мқҙм§Җ,
      // 'hair' вҶ’ м–ҙл‘җмҡҙ hair color, 'eye_iris' вҶ’ prompt hue, 'eye_white' вҶ’ нқ°мғү л“ұ.
      // мӢӨ лІӨлҚ” мқҙлҜём§Җк°Җ н•©лҘҳн•ҳлҠ” ОІ P3+ к№Ңм§Җ "н”„лЎ¬н”„нҠёлҘј л°”кҫёл©ҙ мәҗлҰӯн„°к°Җ л°”лҖҗлӢӨ" лҘј
      // к°ҖлҠҘн•ң avatar-like н•ҳкІҢ Mock н•ңлӢӨ.
      function mockCategoryOf(slotId) {
        if (slotId === "face_base" || slotId === "face_shadow" || slotId === "nose") return "skin";
        if (slotId === "cheek_blush") return "blush";
        if (slotId.startsWith("eye_white")) return "eye_white";
        if (slotId.startsWith("eye_iris")) return "eye_iris";
        if (slotId.startsWith("eye_lash_upper")) return "lash_upper";
        if (slotId.startsWith("eye_lash_lower")) return "lash_lower";
        if (slotId.startsWith("brow")) return "brow";
        if (slotId === "mouth_base") return "mouth_lips";
        if (slotId === "mouth_inner") return "mouth_inner";
        if (slotId === "ahoge") return "ahoge";
        if (slotId === "hair_front") return "hair_front";
        if (slotId === "hair_back") return "hair_back";
        if (slotId.startsWith("hair_side")) return "hair_side";
        if (
          slotId === "neck" ||
          slotId === "hip" ||
          slotId.startsWith("arm_") ||
          slotId.startsWith("leg_") ||
          slotId.startsWith("foot_")
        )
          return "skin_body";
        if (
          slotId === "torso" ||
          slotId === "cloth_main" ||
          slotId === "cloth_cape" ||
          slotId === "cloth_skirt"
        )
          return "cloth";
        if (slotId.startsWith("accessory") || slotId === "acc_belt") return "accessory";
        return "generic";
      }

      function mockRoundRect(ctx, x, y, w, h, r) {
        const rr = Math.max(0, Math.min(r, Math.min(w, h) / 2));
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.lineTo(x + w - rr, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
        ctx.lineTo(x + w, y + h - rr);
        ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
        ctx.lineTo(x + rr, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
        ctx.lineTo(x, y + rr);
        ctx.quadraticCurveTo(x, y, x + rr, y);
        ctx.closePath();
      }

      function mockDrawPartShape(ctx, category, x, y, w, h, hueSlot, theme) {
        const cx = x + w / 2;
        const cy = y + h / 2;
        const min = Math.min(w, h);
        switch (category) {
          case "skin": {
            ctx.fillStyle = theme.skin;
            ctx.beginPath();
            ctx.ellipse(cx, cy + h * 0.03, w * 0.46, h * 0.48, 0, 0, Math.PI * 2);
            ctx.fill();
            return;
          }
          case "skin_body": {
            ctx.fillStyle = theme.skin;
            mockRoundRect(ctx, x + w * 0.1, y + h * 0.05, w * 0.8, h * 0.9, min * 0.12);
            ctx.fill();
            return;
          }
          case "blush": {
            ctx.fillStyle = `hsla(${theme.blushHue}, 75%, 76%, 0.82)`;
            ctx.beginPath();
            ctx.ellipse(x + w * 0.2, cy, w * 0.16, h * 0.5, 0, 0, Math.PI * 2);
            ctx.ellipse(x + w * 0.8, cy, w * 0.16, h * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            return;
          }
          case "eye_white": {
            ctx.fillStyle = "hsl(0, 0%, 98%)";
            ctx.beginPath();
            ctx.ellipse(cx, cy, w * 0.44, h * 0.36, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "hsla(0, 0%, 45%, 0.45)";
            ctx.lineWidth = Math.max(2, min * 0.03);
            ctx.stroke();
            return;
          }
          case "eye_iris": {
            ctx.fillStyle = `hsl(${theme.eyeHue}, 65%, 42%)`;
            ctx.beginPath();
            ctx.arc(cx, cy, min * 0.36, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "hsl(0, 0%, 8%)";
            ctx.beginPath();
            ctx.arc(cx, cy, min * 0.16, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "hsla(0, 0%, 100%, 0.85)";
            ctx.beginPath();
            ctx.arc(cx - min * 0.1, cy - min * 0.12, min * 0.08, 0, Math.PI * 2);
            ctx.fill();
            return;
          }
          case "lash_upper": {
            ctx.strokeStyle = theme.lashColor;
            ctx.lineWidth = Math.max(3, h * 0.35);
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(x + w * 0.1, y + h * 0.75);
            ctx.quadraticCurveTo(cx, y + h * 0.1, x + w * 0.9, y + h * 0.75);
            ctx.stroke();
            return;
          }
          case "lash_lower": {
            ctx.strokeStyle = `hsla(0, 0%, 20%, 0.6)`;
            ctx.lineWidth = Math.max(2, h * 0.25);
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(x + w * 0.15, y + h * 0.2);
            ctx.quadraticCurveTo(cx, y + h * 0.9, x + w * 0.85, y + h * 0.2);
            ctx.stroke();
            return;
          }
          case "brow": {
            ctx.strokeStyle = theme.browColor;
            ctx.lineWidth = Math.max(4, h * 0.55);
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(x + w * 0.1, y + h * 0.85);
            ctx.quadraticCurveTo(cx, y + h * 0.05, x + w * 0.9, y + h * 0.55);
            ctx.stroke();
            return;
          }
          case "mouth_lips": {
            ctx.strokeStyle = `hsl(350, 55%, 45%)`;
            ctx.lineWidth = Math.max(3, h * 0.18);
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(x + w * 0.2, y + h * 0.45);
            ctx.quadraticCurveTo(cx, y + h * 0.85, x + w * 0.8, y + h * 0.45);
            ctx.stroke();
            return;
          }
          case "mouth_inner": {
            ctx.fillStyle = `hsl(352, 55%, 30%)`;
            ctx.beginPath();
            ctx.ellipse(cx, cy + h * 0.1, w * 0.28, h * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            return;
          }
          case "ahoge": {
            ctx.fillStyle = theme.hair;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.35, y + h * 0.95);
            ctx.quadraticCurveTo(x + w * 0.1, y + h * 0.4, cx, y + h * 0.05);
            ctx.quadraticCurveTo(x + w * 0.9, y + h * 0.4, x + w * 0.65, y + h * 0.95);
            ctx.closePath();
            ctx.fill();
            return;
          }
          case "hair_front": {
            ctx.fillStyle = theme.hair;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.05, y + h * 0.95);
            ctx.lineTo(x + w * 0.05, y + h * 0.4);
            ctx.bezierCurveTo(
              x + w * 0.18, y + h * 0.05,
              x + w * 0.42, y + h * 0.02,
              x + w * 0.5, y + h * 0.12,
            );
            ctx.bezierCurveTo(
              x + w * 0.58, y + h * 0.02,
              x + w * 0.82, y + h * 0.05,
              x + w * 0.95, y + h * 0.4,
            );
            ctx.lineTo(x + w * 0.95, y + h * 0.95);
            ctx.closePath();
            ctx.fill();
            return;
          }
          case "hair_back": {
            ctx.fillStyle = `hsl(${theme.hairHue}, 45%, ${theme.hairLight - 6}%)`;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.04, y + h * 0.98);
            ctx.quadraticCurveTo(x - w * 0.05, y + h * 0.4, x + w * 0.12, y + h * 0.08);
            ctx.quadraticCurveTo(cx, y - h * 0.02, x + w * 0.88, y + h * 0.08);
            ctx.quadraticCurveTo(x + w * 1.05, y + h * 0.4, x + w * 0.96, y + h * 0.98);
            ctx.closePath();
            ctx.fill();
            return;
          }
          case "hair_side": {
            ctx.fillStyle = theme.hair;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.45, y + h * 0.08);
            ctx.bezierCurveTo(
              x + w * 0.15, y + h * 0.25,
              x + w * 0.1, y + h * 0.7,
              x + w * 0.35, y + h * 0.95,
            );
            ctx.lineTo(x + w * 0.75, y + h * 0.92);
            ctx.bezierCurveTo(
              x + w * 0.55, y + h * 0.65,
              x + w * 0.6, y + h * 0.3,
              x + w * 0.55, y + h * 0.08,
            );
            ctx.closePath();
            ctx.fill();
            return;
          }
          case "cloth": {
            ctx.fillStyle = `hsl(${theme.clothHue}, 55%, 48%)`;
            mockRoundRect(ctx, x + w * 0.08, y + h * 0.05, w * 0.84, h * 0.9, min * 0.1);
            ctx.fill();
            ctx.strokeStyle = `hsla(${theme.clothHue}, 65%, 25%, 0.4)`;
            ctx.lineWidth = Math.max(2, min * 0.02);
            ctx.stroke();
            return;
          }
          case "accessory": {
            ctx.fillStyle = `hsla(${hueSlot}, 65%, 58%, 0.6)`;
            mockRoundRect(ctx, x + w * 0.1, y + h * 0.1, w * 0.8, h * 0.8, min * 0.1);
            ctx.fill();
            return;
          }
          default: {
            const grad = ctx.createRadialGradient(cx, cy, min * 0.1, cx, cy, min * 0.6);
            grad.addColorStop(0, `hsla(${hueSlot}, 70%, 72%, 0.85)`);
            grad.addColorStop(1, `hsla(${hueSlot}, 55%, 42%, 0.78)`);
            ctx.fillStyle = grad;
            ctx.fillRect(x, y, w, h);
          }
        }
      }

      // н”„лЎ¬н”„нҠё н•ҙмӢңм—җм„ң avatar н…Ңл§Ҳ(н”јл¶ҖнҶӨВ·лЁёлҰ¬мғүВ·лҲҲмғүВ·мҳ·мғү) лҘј кІ°м •лЎ мңјлЎң нҢҢмғқ.
      function mockThemeFromPrompt(prompt) {
        const base = mockHashHue(prompt || "default");
        return {
          skin: `hsl(${(base + 15) % 360 < 30 || (base + 15) % 360 > 330 ? 30 : 28}, 40%, ${78 + (base % 8)}%)`,
          blushHue: 350 + ((base >> 2) % 10),
          eyeHue: (base + 80) % 360,
          hairHue: (base + 210) % 360,
          hairLight: 24 + (base % 12),
          get hair() {
            return `hsl(${this.hairHue}, 45%, ${this.hairLight}%)`;
          },
          clothHue: (base + 140) % 360,
          browColor: `hsl(${(base + 210) % 360}, 40%, 22%)`,
          lashColor: `hsl(${(base + 210) % 360}, 30%, 14%)`,
        };
      }

      async function mockGenerateTexture(prompt, atlas) {
        const canvas = document.createElement("canvas");
        canvas.width = MOCK_CANVAS_SIZE;
        canvas.height = MOCK_CANVAS_SIZE;
        const ctx = canvas.getContext("2d");
        if (!ctx) throw new Error("Canvas 2D context unavailable");
        const theme = mockThemeFromPrompt(prompt);
        // нҲ¬лӘ… л°°кІҪ вҖ” sprite лӢЁмң„ н•©м„ұ мӢң л¶Ҳн•„мҡ”н•ң л°°кІҪмғүмқҙ sprite мӮ¬к°Ғнҳ•м—җ л¬»м–ҙ
        // нҢҢмё  лӘЁм–‘мқ„ л§қм№ҳм§Җ м•ҠкІҢ.
        ctx.clearRect(0, 0, MOCK_CANVAS_SIZE, MOCK_CANVAS_SIZE);

        for (const slot of atlas.slots) {
          const [ux, uy, uw, uh] = slot.uv;
          const x = Math.round(ux * MOCK_CANVAS_SIZE);
          const y = Math.round(uy * MOCK_CANVAS_SIZE);
          const w = Math.max(2, Math.round(uw * MOCK_CANVAS_SIZE));
          const h = Math.max(2, Math.round(uh * MOCK_CANVAS_SIZE));
          const key = `${prompt}::${slot.slot_id}`;
          const hue = mockHashHue(key);
          const category = mockCategoryOf(slot.slot_id);
          ctx.save();
          mockDrawPartShape(ctx, category, x, y, w, h, hue, theme);
          ctx.restore();
        }

        const blob = await new Promise((resolve, reject) => {
          canvas.toBlob((b) => {
            if (b) resolve(b);
            else reject(new Error("canvas.toBlob returned null"));
          }, "image/png");
        });
        const url = URL.createObjectURL(blob);
        return { textureUrl: url, width: MOCK_CANVAS_SIZE, height: MOCK_CANVAS_SIZE };
      }

      // ОІ P2-S1+S3 вҖ” Generate лІ„нҠј wiring + phase timing мёЎм •.
      const promptInput = document.querySelector("#prompt-input");
      const generateBtn = document.querySelector("#generate-btn");
      const genStatusEl = document.querySelector("#gen-status");
      const genTimingEl = document.querySelector("#gen-timing");
      const pillEls = Array.from(document.querySelectorAll(".gen-pill"));
      let lastBlobUrl = null;

      // ОІ В§7 "вүӨ5000ms promptвҶ’preview" мҳҲмӮ°. P2-S3 м—җм„ң лҸ„мһ… вҖ” л„ҳмңјл©ҙ UI м—җ л№Ёк°ӣкІҢ.
      const BETA_BUDGET_MS = 5000;
      const PHASE_LABELS = ["ingest", "synth", "atlas", "swap", "paint"];

      // ОІ P2-S4 вҖ” н…”л Ҳл©”нҠёлҰ¬ нӣ…. phase ms лҘј кө¬мЎ°нҷ”лҗң console.info("geny.metric", ...)
      // лЎң emit. P5 staging м—җм„ң log scraper к°Җ Prometheus pushgateway лЎң ліҖнҷҳ.
      // window.__genyMetricsSink к°Җ мһҲмңјл©ҙ к·ё н•ЁмҲҳм—җлҸ„ fan-out (н…ҢмҠӨнҠёВ·dev нҢЁл„җмҡ©).
      // ОІ P2-S5 вҖ” мқҙлІӨнҠё мҠӨнӮӨл§ҲлҠ” `@geny/web-editor-logic` мқҳ мҲңмҲҳ н•ЁмҲҳ
      // `buildGenerateMetricEvents` лЎң л¶„лҰ¬ (node:test нҡҢк·Җ 71 к°ң). м—¬кё°м„  emit кІҪлЎңл§Ң м–ҮкІҢ.
      function emitMetric(event) {
        try {
          console.info("geny.metric", event);
          const sink = globalThis?.__genyMetricsSink;
          if (typeof sink === "function") sink(event);
        } catch {
          // metric emit мқҙ мӢӨ кІҪлЎңлҘј к№Ём„  м•Ҳ лҗЁ.
        }
      }

      function emitGenerateMetrics({ trigger, prompt, phaseMs, totalMs, budgetMs, ok }) {
        const events = buildGenerateMetricEvents({
          ts: Date.now(),
          trigger,
          template: document.querySelector("#template-picker")?.value ?? "unknown",
          prompt,
          phaseMs,
          totalMs,
          budgetMs,
          ok,
        });
        for (const e of events) emitMetric(e);
      }

      function setPillPhase(index, phase) {
        const el = pillEls[index - 1];
        if (!el) return;
        if (phase) el.setAttribute("data-phase", phase);
        else el.removeAttribute("data-phase");
      }

      function resetPills() {
        for (const p of pillEls) p.removeAttribute("data-phase");
      }

      function renderTimings(phaseMs, totalMs) {
        if (!genTimingEl) return;
        genTimingEl.hidden = false;
        const budget = totalMs <= BETA_BUDGET_MS ? "ok" : "over";
        const phases = phaseMs
          .map((ms, i) => `<span class="phase" title="${PHASE_LABELS[i]}">${PHASE_LABELS[i]} ${Math.round(ms)}ms</span>`)
          .join("");
        genTimingEl.innerHTML = `${phases}<span class="phase total" data-budget="${budget}" title="ОІ В§7 budget вүӨ${BETA_BUDGET_MS}ms">мҙқ ${Math.round(totalMs)}ms</span>`;
      }

      function renderTimingError(phaseMs, totalMs) {
        if (!genTimingEl) return;
        genTimingEl.hidden = false;
        const phases = phaseMs
          .map((ms, i) => `<span class="phase" title="${PHASE_LABELS[i]}">${PHASE_LABELS[i]} ${Math.round(ms)}ms</span>`)
          .join("");
        genTimingEl.innerHTML = `${phases}<span class="phase" style="color:#f0b0b0;">вң— ${Math.round(totalMs)}ms</span>`;
      }

      async function runGenerate() {
        const prompt = (promptInput?.value ?? "").trim();
        if (!prompt) {
          genStatusEl.textContent = "н”„лЎ¬н”„нҠёлҘј мһ…л Ҙн•ҳм„ёмҡ”";
          return;
        }
        if (!pixiRenderer) {
          genStatusEl.textContent = "?renderer=pixi н•„мҡ”";
          return;
        }
        const atlas = pixiRenderer.lastAtlas;
        if (!atlas) {
          genStatusEl.textContent = "atlas м—ҶмқҢ вҖ” лІҲл“Ө лҢҖкё°";
          return;
        }

        generateBtn.disabled = true;
        resetPills();
        const phaseMs = [0, 0, 0, 0, 0];
        const t0 = performance.now();
        let tPhase = t0;
        const markPhaseDone = (idx) => {
          const now = performance.now();
          phaseMs[idx - 1] = now - tPhase;
          tPhase = now;
          setPillPhase(idx, "done");
        };
        try {
          setPillPhase(1, "active");
          genStatusEl.textContent = "н”„лЎ¬н”„нҠё н•ҙм„қ";
          await new Promise((r) => setTimeout(r, 30));
          markPhaseDone(1);

          setPillPhase(2, "active");
          genStatusEl.textContent = "н…ҚмҠӨмІҳ н•©м„ұ";
          const mock = await mockGenerateTexture(prompt, atlas);
          markPhaseDone(2);

          setPillPhase(3, "active");
          genStatusEl.textContent = "atlas мһ¬кө¬м„ұ";
          const newAtlas = {
            textures: [{ path: atlas.textures[0]?.path ?? "textures/base.png", width: mock.width, height: mock.height }],
            slots: atlas.slots,
          };
          markPhaseDone(3);

          setPillPhase(4, "active");
          genStatusEl.textContent = "лІҲл“Ө көҗмІҙ";
          if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
          lastBlobUrl = mock.textureUrl;
          // ОІ P2-S3 вҖ” regenerate лҠ” Promise. actual canvas swap мқҙ лҒқлӮң мӢңм җм—җ resolve.
          const regenPromise = pixiRenderer.regenerate({
            atlas: newAtlas,
            textureUrl: mock.textureUrl,
          });
          markPhaseDone(4);

          setPillPhase(5, "active");
          genStatusEl.textContent = "л ҢлҚ” нҠёлҰ¬кұ°";
          // мӢӨ мҠӨн”„лқјмқҙнҠё көҗмІҙ (л№„лҸҷкё° н…ҚмҠӨмІҳ л””мҪ”л“ң + buildSpriteScene) мҷ„лЈҢ лҢҖкё°.
          await (regenPromise ?? Promise.resolve());
          markPhaseDone(5);

          const total = performance.now() - t0;
          const budget = total <= BETA_BUDGET_MS ? "ok" : "over";
          genStatusEl.textContent = budget === "ok" ? `вң“ ${Math.round(total)}ms` : `вҡ  ${Math.round(total)}ms (>${BETA_BUDGET_MS})`;
          renderTimings(phaseMs, total);
          emitGenerateMetrics({
            trigger: "user",
            prompt,
            phaseMs,
            totalMs: total,
            budgetMs: BETA_BUDGET_MS,
            ok: true,
          });
        } catch (err) {
          const total = performance.now() - t0;
          console.error("[generate] failed", err);
          genStatusEl.textContent = `error: ${err?.message ?? err}`;
          for (let i = 1; i <= 5; i += 1) {
            if (pillEls[i - 1]?.getAttribute("data-phase") === "active") {
              setPillPhase(i, "err");
            }
          }
          renderTimingError(phaseMs, total);
          emitGenerateMetrics({
            trigger: "user",
            prompt,
            phaseMs,
            totalMs: total,
            budgetMs: BETA_BUDGET_MS,
            ok: false,
          });
        } finally {
          generateBtn.disabled = false;
        }
      }

      generateBtn.addEventListener("click", () => void runGenerate());
      promptInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          void runGenerate();
        }
      });
      // мҙҲкё° мғҒнғң м•ҲлӮҙ: pixi м—Ҷмңјл©ҙ лҜёлҰ¬ м•Ңл ӨмЈјкё°.
      if (!pixiEnabled) {
        genStatusEl.textContent = "?renderer=pixi н•„мҡ”";
      }

      // ОІ P1-S6 вҖ” мҙҲкё° лЎңл“ң л•Ң placeholder PNG (4Г—4) лҘј л°”лЎң Mock avatar лЎң көҗмІҙ.
      // мӮ¬мҡ©мһҗк°Җ Generate лҘј лҲ„лҘҙкё° м „м—җлҸ„ ОІ лҚ°лӘЁк°Җ "м•„л°”нғҖмІҳлҹј ліҙмқёлӢӨ".
      // мӨ‘ліө мӢӨн–үмқ„ л§үлҠ” н”Ңлһҳк·ё autoPreviewDone мқҖ мғҒлӢЁм—җм„ң м„ м–ё (swapTemplate м—җм„ң лҰ¬м…Ӣ).
      async function runAutoPreview() {
        if (autoPreviewDone) return;
        if (!pixiEnabled || !pixiRenderer) return;
        const atlas = pixiRenderer.lastAtlas;
        if (!atlas) return;
        autoPreviewDone = true;
        const phaseMs = [0, 0, 0, 0, 0];
        const t0 = performance.now();
        let tPhase = t0;
        const currentTemplate = document.querySelector("#template-picker")?.value ?? "halfbody";
        const defaultPrompt = `default В· ${currentTemplate}`;
        try {
          phaseMs[0] = 0; // auto м—җлҠ” мӮ¬мҡ©мһҗ мһ…л Ҙ лҢҖкё° м—ҶмқҢ
          tPhase = performance.now();
          const mock = await mockGenerateTexture(defaultPrompt, atlas);
          phaseMs[1] = performance.now() - tPhase;
          tPhase = performance.now();
          const newAtlas = {
            textures: [
              {
                path: atlas.textures[0]?.path ?? "textures/base.png",
                width: mock.width,
                height: mock.height,
              },
            ],
            slots: atlas.slots,
          };
          phaseMs[2] = performance.now() - tPhase;
          tPhase = performance.now();
          if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
          lastBlobUrl = mock.textureUrl;
          const regenPromise = pixiRenderer.regenerate({ atlas: newAtlas, textureUrl: mock.textureUrl });
          phaseMs[3] = performance.now() - tPhase;
          tPhase = performance.now();
          await (regenPromise ?? Promise.resolve());
          phaseMs[4] = performance.now() - tPhase;
          const total = performance.now() - t0;
          console.info("[auto-preview] initial avatar painted for", currentTemplate, `${Math.round(total)}ms`);
          emitGenerateMetrics({
            trigger: "auto",
            prompt: defaultPrompt,
            phaseMs,
            totalMs: total,
            budgetMs: BETA_BUDGET_MS,
            ok: true,
          });
        } catch (err) {
          const total = performance.now() - t0;
          console.warn("[auto-preview] failed", err);
          autoPreviewDone = false;
          emitGenerateMetrics({
            trigger: "auto",
            prompt: defaultPrompt,
            phaseMs,
            totalMs: total,
            budgetMs: BETA_BUDGET_MS,
            ok: false,
          });
        }
      }

      // `<geny-avatar>` ready мқҙлІӨнҠём—җ нӣ… вҖ” pixi л ҢлҚ”лҹ¬к°Җ к°ҷмқҖ мқҙлІӨнҠём—җм„ң captureBundle
      // лЎң lastAtlas лҘј мұ„мҡ°лҜҖлЎң, 2 microtask м–‘ліҙ нӣ„ мӢӨн–үн•ҙ мҲңм„ң мқҳмЎҙмқ„ нҡҢн”ј.
      el.addEventListener("ready", () => {
        queueMicrotask(() => {
          queueMicrotask(() => {
            void runAutoPreview();
          });
        });
      });

      // pixiRenderer к°Җ dynamic import лЎң лӮҳмӨ‘м—җ attach лҗ  мҲҳ мһҲмңјлҜҖлЎң, лЎңл“ң мҷ„лЈҢ мӢң
      // мқҙлҜё bundle мқҙ ready мғҒнғңл©ҙ мҰүмӢң auto-preview мӢңлҸ„. (race: 1) bundle лЁјм Җ ready
      // вҶ’ pixi attach л’Ө captureBundle мӢӨн–үлҗЁ вҖ” мқҙ мӢңм җм—җ catch-up).
      if (pixiEnabled) {
        // нҸҙл§Ғ лҢҖмӢ  setInterval мөңлҢҖ 30нҡҢ(~1.5s) л§Ң вҖ” мқҙнӣ„м—” нҸ¬кё°.
        let tries = 0;
        const iv = setInterval(() => {
          tries += 1;
          if (autoPreviewDone || tries >= 30) {
            clearInterval(iv);
            return;
          }
          if (pixiRenderer && pixiRenderer.lastAtlas) {
            clearInterval(iv);
            void runAutoPreview();
          }
        }, 50);
      }

      (async function bootstrap() {
        try {
          const res = await fetch("./public/INDEX.json");
          if (!res.ok) throw new Error(`INDEX.json HTTP ${res.status}`);
          const manifest = await res.json();
          const templates = Array.isArray(manifest.templates) ? manifest.templates : [];
          if (templates.length === 0) throw new Error("INDEX.json.templates is empty");
          pickerEl.replaceChildren();
          for (const t of templates) {
            const opt = document.createElement("option");
            opt.value = t.bundle;
            opt.textContent = t.label ?? t.id;
            pickerEl.appendChild(opt);
          }
          pickerEl.addEventListener("change", () => swapTemplate(pickerEl.value));
          swapTemplate(templates[0].bundle);
        } catch (err) {
          statusEl.className = "status err";
          statusEl.textContent = `bootstrap error вҖ” ${err?.message ?? err}`;
          console.error(err);
        }
      })();
    </script>
  </body>
</html>
