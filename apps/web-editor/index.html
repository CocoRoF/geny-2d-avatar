<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Geny 2D Avatar · Foundation Editor</title>
    <style>
      :root {
        color-scheme: light dark;
        --border: #d9dde3;
        --border-soft: #eceef2;
        --muted: #6b7280;
        --accent: #2b4a8b;
        --accent-soft: #eef4ff;
        --bg-panel: #ffffff;
        --bg-page: #f7f8fa;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --border: #2d3138;
          --border-soft: #23262b;
          --muted: #9aa1ad;
          --accent: #a9c4ff;
          --accent-soft: #1b2236;
          --bg-panel: #16181d;
          --bg-page: #0e1014;
        }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg-page); }
      body { display: grid; grid-template-rows: auto auto 1fr; font-size: 14px; line-height: 1.45; }

      /* β P2-S1 — Generate bar: 프롬프트 → 실 아바타 렌더 */
      .generate-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-panel);
      }
      .generate-bar label {
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .generate-bar input[type="text"] {
        flex: 1;
        min-width: 180px;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--bg-page);
        color: inherit;
        font-size: 13px;
      }
      .generate-bar button.generate {
        padding: 6px 14px;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      .generate-bar button.generate[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .generate-bar .gen-status {
        min-width: 120px;
        font-size: 12px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .generate-bar .gen-pills {
        display: flex;
        gap: 4px;
      }
      .generate-bar .gen-pill {
        width: 28px;
        height: 6px;
        border-radius: 3px;
        background: var(--border-soft);
        transition: background 0.15s;
      }
      .generate-bar .gen-pill[data-phase="active"] { background: var(--accent); }
      .generate-bar .gen-pill[data-phase="done"] { background: #4aa56e; }
      .generate-bar .gen-pill[data-phase="err"] { background: #c94a4a; }
      /* β P2-S3 — timing breakdown: 프롬프트→스왑 각 phase 의 ms + 총합 + β §7 예산 표시. */
      .generate-bar .gen-timing {
        display: flex;
        gap: 6px;
        font-size: 11px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .generate-bar .gen-timing .phase {
        padding: 1px 4px;
        border-radius: 3px;
        background: var(--border-soft);
      }
      .generate-bar .gen-timing .total[data-budget="ok"] { background: #2b4a39; color: #b7e4c5; }
      .generate-bar .gen-timing .total[data-budget="over"] { background: #5a2a2a; color: #f0b0b0; }

      /* TopBar */
      header.topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-panel);
      }
      .topbar .brand { font-weight: 600; letter-spacing: 0.01em; }
      .topbar .avatar-name {
        padding: 4px 10px;
        border: 1px solid var(--border-soft);
        border-radius: 6px;
        background: var(--bg-page);
        font-variant-numeric: tabular-nums;
      }
      .topbar .template-picker {
        padding: 4px 8px;
        border: 1px solid var(--border);
        background: var(--bg-panel);
        border-radius: 6px;
        font-size: 13px;
        color: inherit;
      }
      .topbar .actions { margin-left: auto; display: flex; gap: 6px; }
      .topbar button {
        padding: 4px 12px;
        border: 1px solid var(--border);
        background: var(--bg-panel);
        border-radius: 6px;
        font-size: 13px;
        color: var(--muted);
        cursor: not-allowed;
      }
      .topbar button[disabled] { opacity: 0.6; }

      /* 3-column layout */
      main.editor {
        display: grid;
        grid-template-columns: 260px 1fr 320px;
        min-height: 0;
      }
      .pane {
        border-right: 1px solid var(--border);
        background: var(--bg-panel);
        overflow-y: auto;
        min-width: 0;
      }
      .pane:last-child { border-right: none; border-left: 1px solid var(--border); }
      .pane h2 {
        margin: 0;
        padding: 10px 14px;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        border-bottom: 1px solid var(--border-soft);
        position: sticky;
        top: 0;
        background: var(--bg-panel);
        z-index: 1;
      }

      /* Parts sidebar */
      .parts-group { padding: 8px 8px 14px; }
      .parts-group .group-label {
        padding: 4px 6px;
        font-size: 0.72rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .parts-list { list-style: none; margin: 0; padding: 0; }
      .parts-list li {
        padding: 6px 8px;
        border-radius: 6px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }
      .parts-list li:hover { background: var(--border-soft); }
      .parts-list li[aria-selected="true"] {
        background: var(--accent-soft);
        color: var(--accent);
      }
      .parts-list .slot-id {
        margin-left: auto;
        color: var(--muted);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }

      /* Preview Player */
      .preview {
        display: grid;
        grid-template-rows: 1fr auto;
        background: var(--bg-page);
      }
      .stage {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .stage-inner {
        width: min(480px, 100%);
        aspect-ratio: 3 / 4;
        border: 1px solid var(--border);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-panel);
        color: var(--muted);
        font-size: 0.85rem;
        text-align: center;
        padding: 8px;
        position: relative;
      }
      .stage-inner svg[data-testid="structure-preview"] {
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 1;
      }
      .stage-inner .pixi-mount {
        position: absolute;
        inset: 0;
        z-index: 0;
        border-radius: 12px;
        overflow: hidden;
        pointer-events: none;
      }
      .preview-controls {
        display: flex;
        gap: 10px;
        padding: 10px 16px;
        border-top: 1px solid var(--border);
        background: var(--bg-panel);
        color: var(--muted);
        font-size: 12px;
      }
      .preview-controls em { font-style: normal; }

      /* Inspector */
      .inspector-body { padding: 12px 14px; }
      .kv {
        display: grid;
        grid-template-columns: 120px 1fr;
        row-gap: 6px;
        column-gap: 10px;
        font-size: 13px;
      }
      .kv dt { color: var(--muted); }
      .kv dd { margin: 0; font-variant-numeric: tabular-nums; word-break: break-word; }
      .status {
        margin: 10px 14px;
        padding: 8px 12px;
        border-radius: 6px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
      }
      .status.ok { background: #e8f6ed; color: #205d38; }
      .status.err { background: #fbe9e9; color: #7a1f1f; }
      .empty-hint { color: var(--muted); font-size: 13px; padding: 8px 0; }

      /* 세션 90 — Parameters 패널 */
      .params-section { margin-top: 16px; }
      .params-section > .section-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .param-group { margin: 0 0 10px; padding: 8px 0; border-top: 1px solid var(--border-soft); }
      .param-group:first-of-type { border-top: none; }
      .param-group .group-head {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .param-row {
        display: grid;
        grid-template-columns: 1fr 60px;
        column-gap: 8px;
        align-items: center;
        padding: 3px 0;
        font-size: 12px;
      }
      .param-row label { color: var(--muted); font-size: 11px; }
      .param-row input[type="range"] { width: 100%; }
      .param-row .readout {
        font-variant-numeric: tabular-nums;
        font-size: 11px;
        text-align: right;
        color: var(--accent);
      }

      /* 세션 94 — Motions / Expressions 컨트롤 */
      .playback-section { margin-top: 16px; }
      .playback-section > .section-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .playback-row { display: flex; flex-wrap: wrap; gap: 6px; }
      .playback-row button {
        padding: 4px 10px;
        border: 1px solid var(--border);
        background: var(--bg-panel);
        border-radius: 6px;
        font-size: 12px;
        color: inherit;
        cursor: pointer;
      }
      .playback-row button:hover { background: var(--accent-soft); }
      .playback-row button[aria-pressed="true"] {
        background: var(--accent-soft);
        color: var(--accent);
        border-color: var(--accent);
      }
      .playback-readout {
        margin-top: 6px;
        font-size: 11px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }
      .playback-readout span { color: var(--accent); }
      geny-avatar { display: none; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="brand">Geny Editor</span>
      <span id="avatar-name" class="avatar-name">—</span>
      <select id="template-picker" class="template-picker" aria-label="template"></select>
      <div class="actions">
        <button disabled title="Runtime (세션 82+)">Save</button>
        <button disabled title="Runtime">History</button>
        <button disabled title="Runtime">Share</button>
        <button disabled title="Runtime">Export</button>
      </div>
    </header>

    <!-- β P2-S1 — Prompt → Mock texture generator → pixi renderer regenerate.
         `?renderer=pixi` 모드에서 실제로 새 avatar 픽셀이 교체된다. Mock 은 브라우저
         Canvas 2D 로 결정론 텍스처(HSL hash(prompt+slot_id)) 를 생성 — 실 벤더
         (nano-banana) 통합은 β P3 에서 BL-VENDOR-KEY 해제 후. -->
    <div class="generate-bar" id="generate-bar">
      <label for="prompt-input">Prompt</label>
      <input
        id="prompt-input"
        type="text"
        placeholder="예: 갈색 단발 소녀, 빨간 셔츠"
        autocomplete="off"
      />
      <div class="gen-pills" aria-label="generation phases">
        <div class="gen-pill" data-pill="1" title="prompt ingest"></div>
        <div class="gen-pill" data-pill="2" title="synth textures"></div>
        <div class="gen-pill" data-pill="3" title="build atlas"></div>
        <div class="gen-pill" data-pill="4" title="swap bundle"></div>
        <div class="gen-pill" data-pill="5" title="repaint"></div>
      </div>
      <button id="generate-btn" class="generate" type="button">Generate</button>
      <span id="gen-status" class="gen-status">준비</span>
      <div id="gen-timing" class="gen-timing" aria-label="phase timings" hidden></div>
    </div>

    <main class="editor">
      <aside class="pane" aria-label="parts sidebar">
        <h2>Parts</h2>
        <div id="status" class="status">로딩 중…</div>
        <div id="parts-groups"></div>
      </aside>

      <section class="preview" aria-label="preview player">
        <div class="stage">
          <div class="stage-inner" id="stage-inner">
            <div class="pixi-mount" id="pixi-mount"></div>
            <geny-avatar id="avatar"></geny-avatar>
          </div>
        </div>
        <div class="preview-controls">
          <em>Structure preview · rotation = head_angle_x</em>
          <span style="margin-left:auto">Stage 3 — motion/expression state only (render = Runtime)</span>
        </div>
      </section>

      <aside class="pane" aria-label="inspector">
        <h2>Inspector</h2>
        <div class="inspector-body" id="inspector">
          <p class="empty-hint">파츠를 선택하면 slot · role · 소속 그룹이 표시됩니다.</p>
        </div>
      </aside>
    </main>

    <!-- β P1-S1 — `import("pixi.js")` 를 vendored ESM bundle 로 해석. Default 경로에선
         pixi bundle 을 load 하지 않음 (`?renderer=pixi` 쿼리 시 dynamic import 진입). -->
    <script type="importmap">
      {
        "imports": {
          "pixi.js": "./public/vendor/pixi.min.mjs"
        }
      }
    </script>
    <script type="module" src="./public/vendor/index.js"></script>
    <script type="module">
      import {
        CATEGORY_ORDER,
        categorize,
        parametersForPart,
        buildGenerateMetricEvents,
        summarizeMetricHistory,
        planGenerateAttempts,
        classifyGenerateFailure,
        shouldRetry,
        attemptOutcomeLabels,
      } from "./public/vendor/web-editor-logic/index.js";
      import { createStructureRenderer } from "./public/vendor/web-editor-renderer/index.js";

      // 세션 116 — `?debug=logger` URL 파라미터가 있으면 `@geny/web-avatar-renderer`
      // 의 `createLoggingRenderer` 를 `<geny-avatar>` 에 추가로 attach 해 ready /
      // parameterchange / destroy 이벤트 스트림을 `console.debug` 로 흘린다. 기본
      // 경로에선 import 하지 않아 런타임 바이트 무증가 (dynamic import).
      const debugFlag = new URLSearchParams(location.search).get("debug") ?? "";
      const debugFlagSet = new Set(debugFlag.split(",").map((s) => s.trim()).filter(Boolean));
      const debugLoggerEnabled = debugFlagSet.has("logger");
      // β P1-S9 — `?debug=pivots` 오버레이. P1-S8 로 주입된 halfbody/fullbody 각
      // 파츠 atlas pivot_uv 의 실 화면 위치를 빨간 원 (주입됨) / 회색 원 (fallback)
      // 으로 표시. 기본 경로에선 비활성 (bundle/렌더 비용 무증가).
      const debugPivotsEnabled = debugFlagSet.has("pivots");
      // β P2-S6 — `?debug=metrics` 오버레이. `__genyMetricsSink` 로 흘러온
      // generate.phase / generate.total 이벤트를 ring buffer (최근 200 개) 에
      // 쌓고 `summarizeMetricHistory` (순수 함수, 단위 테스트 9 개) 로 집계해
      // 화면 우하단 고정 패널에 budget_ok rate / phase 평균 / p95 / lastRun 을
      // 실시간 표시. 기본 경로에선 sink 주입 자체를 skip (zero-cost).
      const debugMetricsEnabled = debugFlagSet.has("metrics");
      let debugLoggingRenderer = null;

      // β P1-S1 — `?renderer=pixi` 쿼리가 켜지면 `@geny/web-avatar-renderer-pixi` 의
      // `createPixiRenderer` 를 `<geny-avatar>` 에 attach 해 pixi.js 로 실 픽셀을
      // 그린다. SVG 구조 프리뷰는 그대로 유지 (interaction 전담) — pixi 캔버스는
      // 구조 SVG 뒤에 absolute 스택. Default 경로에선 load 하지 않음.
      const rendererFlag = new URLSearchParams(location.search).get("renderer") ?? "";
      const pixiEnabled = rendererFlag === "pixi";
      let pixiRenderer = null;
      // β P1-S6 — 초기 avatar 자동 생성 플래그 (swapTemplate 에서 리셋 → TDZ 회피 위해 상단 선언).
      let autoPreviewDone = false;

      const statusEl = document.querySelector("#status");
      const groupsEl = document.querySelector("#parts-groups");
      const inspectorEl = document.querySelector("#inspector");
      const avatarNameEl = document.querySelector("#avatar-name");
      const pickerEl = document.querySelector("#template-picker");
      const el = document.querySelector("#avatar");
      const stageEl = document.querySelector("#stage-inner");

      // 세션 91 — 구조 프리뷰 렌더러 장착. `<geny-avatar>` 의 ready + parameterchange
      // 이벤트를 구독해 SVG 로 파츠 그리드를 그린다. Cubism/WebGL 실 렌더러는 후속.
      // 세션 92 — onSelectPart 콜백으로 Preview 클릭 → 사이드바 선택 양방향 바인딩.
      // partNodeBySlot 은 파츠 li DOM 을 slot_id → 노드로 역조회하는 맵.
      const partNodeBySlot = new Map();
      const renderer = createStructureRenderer({
        element: el,
        mount: stageEl,
        onSelectPart: (part) => {
          if (!part) {
            clearSidebarSelection();
            renderParametersFor(null);
            renderInspectorEmpty();
            return;
          }
          const entry = partNodeBySlot.get(part.slot_id);
          if (entry) selectSidebarEntry(entry.li, entry.part, entry.cat, { fromRenderer: true });
        },
      });

      // β P1-S1 — `?renderer=pixi` 경로에서만 dynamic import. pixi.js + 본 패키지
      // 모두 vendored ESM 번들 / importmap 으로 해석됨. 에디터 본연은 실패해도
      // 동작하도록 catch 후 silent skip.
      if (pixiEnabled) {
        const pixiMountEl = document.querySelector("#pixi-mount");
        import("./public/vendor/web-avatar-renderer-pixi/index.js")
          .then(({ createPixiRenderer }) => {
            pixiRenderer = createPixiRenderer({
              element: el,
              mount: pixiMountEl,
              debugPivots: debugPivotsEnabled,
            });
            console.info(
              "[geny-avatar/pixi] attached via ?renderer=pixi",
              debugPivotsEnabled ? "(+debug=pivots overlay)" : "",
            );
          })
          .catch((err) => {
            console.warn("[geny-avatar/pixi] dynamic import failed", err);
          });
      }

      // 세션 116 — `?debug=logger` 경로에서만 dynamic import. 실패해도 에디터 본연은
      // 동작해야 하므로 catch 만 해두고 조용히 skip (dev 편의용 스위치).
      if (debugLoggerEnabled) {
        import("./public/vendor/web-avatar-renderer/index.js")
          .then(({ createLoggingRenderer }) => {
            debugLoggingRenderer = createLoggingRenderer({
              element: el,
              logger: (event) => {
                // 구별 가능한 prefix 로 엔진 로그 / 다른 console 메시지와 섞이지 않게.
                console.debug("[geny-avatar/logger]", event);
              },
            });
            console.info("[geny-avatar/logger] attached via ?debug=logger");
          })
          .catch((err) => {
            console.warn("[geny-avatar/logger] dynamic import failed", err);
          });
      }

      function renderParts(groups) {
        groupsEl.replaceChildren();
        partNodeBySlot.clear();
        for (const cat of [...CATEGORY_ORDER, ...[...groups.keys()].filter((c) => !CATEGORY_ORDER.includes(c))]) {
          const items = groups.get(cat);
          if (!items) continue;
          const wrap = document.createElement("div");
          wrap.className = "parts-group";
          const label = document.createElement("div");
          label.className = "group-label";
          label.textContent = `${cat} · ${items.length}`;
          wrap.appendChild(label);
          const ul = document.createElement("ul");
          ul.className = "parts-list";
          for (const p of items) {
            const li = document.createElement("li");
            li.dataset.slotId = p.slot_id;
            li.dataset.role = p.role;
            li.dataset.category = cat;
            const role = document.createElement("span");
            role.textContent = p.role;
            const slot = document.createElement("span");
            slot.className = "slot-id";
            slot.textContent = p.slot_id;
            li.append(role, slot);
            li.addEventListener("click", () => selectSidebarEntry(li, p, cat, { fromRenderer: false }));
            ul.appendChild(li);
            partNodeBySlot.set(p.slot_id, { li, part: p, cat });
          }
          wrap.appendChild(ul);
          groupsEl.appendChild(wrap);
        }
      }

      function clearSidebarSelection() {
        document.querySelectorAll('.parts-list li[aria-selected="true"]').forEach((n) =>
          n.setAttribute("aria-selected", "false"),
        );
      }

      // 세션 92 — 단일 진입점. 사이드바 클릭은 fromRenderer=false 로 renderer 에게 선택을
      // 밀어넣고, Preview 클릭 (onSelectPart) 은 fromRenderer=true 로 사이드바만 갱신해
      // echo 루프를 차단. `renderer.setSelectedSlot` 은 콜백을 호출하지 않으므로 루프 없음.
      // 세션 95 — 선택 시 Inspector 파라미터 패널을 선택된 파츠 기준으로 필터 재빌드.
      function selectSidebarEntry(node, part, cat, { fromRenderer }) {
        clearSidebarSelection();
        node.setAttribute("aria-selected", "true");
        renderParametersFor(part);
        renderInspector(part, cat);
        if (!fromRenderer) renderer.setSelectedSlot(part.slot_id);
      }

      function renderInspector(part, cat) {
        inspectorEl.replaceChildren();
        const dl = document.createElement("dl");
        dl.className = "kv";
        for (const [k, v] of [
          ["slot_id", part.slot_id],
          ["role", part.role],
          ["category", cat],
        ]) {
          const dt = document.createElement("dt");
          dt.textContent = k;
          const dd = document.createElement("dd");
          dd.textContent = v;
          dl.append(dt, dd);
        }
        inspectorEl.appendChild(dl);
        const note = document.createElement("p");
        note.className = "empty-hint";
        note.textContent = "Prompt / Style Profile / Regenerate 는 세션 82+ (Runtime) 이후.";
        inspectorEl.appendChild(note);
        // 세션 90 — Parameters 슬라이더 재주입 (inspector replaceChildren 이후).
        if (paramSectionEl) inspectorEl.appendChild(paramSectionEl);
        // 세션 94 — Motion / Expression 컨트롤 재주입.
        if (motionSectionEl) inspectorEl.appendChild(motionSectionEl);
        if (expressionSectionEl) inspectorEl.appendChild(expressionSectionEl);
      }

      // 세션 90 — `<geny-avatar>` setParameter/parameterchange 계약을 바인딩.
      // 파라미터 1개당 input[type=range] + readout. 슬라이더 → setParameter, 엘리먼트
      // 상태 → parameterchange 이벤트 → readout 업데이트 (클램프 반영).
      // 세션 95 — 선택된 파츠 기준 서브셋 재빌드 + 현재 값 시드 (getParameters 스냅샷).
      let paramSectionEl = null;
      let allParameters = [];
      let allParameterGroups = [];
      const readoutByIdRef = new Map();

      function renderParameters(parameters, parameterGroups, opts) {
        readoutByIdRef.clear();
        const totalCount = opts?.totalCount ?? parameters.length;
        const initialValuesById = opts?.initialValuesById ?? {};
        const section = document.createElement("div");
        section.className = "params-section";
        section.dataset.testid = "parameters";
        const label = document.createElement("div");
        label.className = "section-label";
        label.textContent = totalCount > parameters.length
          ? `Parameters · ${parameters.length} / ${totalCount}`
          : `Parameters · ${parameters.length}`;
        section.appendChild(label);

        const groupTitleById = new Map(parameterGroups.map((g) => [g.id, g.display_name_en]));
        const byGroup = new Map();
        for (const p of parameters) {
          const key = p.group ?? "other";
          if (!byGroup.has(key)) byGroup.set(key, []);
          byGroup.get(key).push(p);
        }
        for (const [gid, rows] of byGroup) {
          const groupEl = document.createElement("div");
          groupEl.className = "param-group";
          groupEl.dataset.groupId = gid;
          const head = document.createElement("div");
          head.className = "group-head";
          head.textContent = `${groupTitleById.get(gid) ?? gid} · ${rows.length}`;
          groupEl.appendChild(head);
          for (const p of rows) {
            const row = document.createElement("div");
            row.className = "param-row";
            row.dataset.paramId = p.id;
            const labelEl = document.createElement("label");
            labelEl.textContent = p.id;
            labelEl.htmlFor = `param-${p.id}`;
            const input = document.createElement("input");
            input.type = "range";
            input.id = `param-${p.id}`;
            input.min = String(p.range[0]);
            input.max = String(p.range[1]);
            input.step = "0.01";
            const seed = initialValuesById[p.id] ?? p.default;
            input.value = String(seed);
            input.addEventListener("input", () => {
              el.setParameter(p.id, parseFloat(input.value));
            });
            const readout = document.createElement("span");
            readout.className = "readout";
            readout.dataset.readoutId = p.id;
            readout.textContent = seed.toFixed(2);
            readoutByIdRef.set(p.id, readout);
            row.append(labelEl, input, readout);
            groupEl.appendChild(row);
          }
          section.appendChild(groupEl);
        }
        paramSectionEl = section;
      }

      // 세션 95 — 선택된 파츠 기준 Inspector 파라미터 패널 재빌드.
      // part=null 이면 전체 파라미터(초기 ready / 선택 해제), 아니면 파츠-바인딩 서브셋.
      function renderParametersFor(part) {
        const subset = parametersForPart(part, allParameters);
        const initialValuesById = el.getParameters();
        renderParameters(subset, allParameterGroups, {
          totalCount: allParameters.length,
          initialValuesById,
        });
      }

      // 초기 상태 + 선택 해제 시 Inspector 를 empty-hint + 3 section 으로 재배치.
      function renderInspectorEmpty() {
        inspectorEl.replaceChildren();
        const hint = document.createElement("p");
        hint.className = "empty-hint";
        hint.textContent = "파츠를 선택하면 slot · role · 소속 그룹이 표시됩니다.";
        inspectorEl.appendChild(hint);
        if (paramSectionEl) inspectorEl.appendChild(paramSectionEl);
        if (motionSectionEl) inspectorEl.appendChild(motionSectionEl);
        if (expressionSectionEl) inspectorEl.appendChild(expressionSectionEl);
      }

      el.addEventListener("parameterchange", (ev) => {
        const readout = readoutByIdRef.get(ev.detail.id);
        if (readout) readout.textContent = ev.detail.value.toFixed(2);
      });

      // 세션 94 — Motion / Expression 컨트롤. 번들 meta 의 motions / expressions 를
      // 버튼 목록으로 노출. 클릭 → `el.playMotion` / `el.setExpression` → 엘리먼트가
      // motionstart / expressionchange 이벤트로 상태를 브로드캐스트 → readout 동기.
      // 실 애니메이션 재생은 Runtime 렌더러(Cubism/WebGL) 합류 후.
      let motionSectionEl = null;
      let expressionSectionEl = null;
      const motionButtonByPackId = new Map();
      const expressionButtonByExpId = new Map();
      let motionReadoutEl = null;
      let expressionReadoutEl = null;

      function renderMotions(motions) {
        motionButtonByPackId.clear();
        const section = document.createElement("div");
        section.className = "playback-section";
        section.dataset.testid = "motions";
        const label = document.createElement("div");
        label.className = "section-label";
        label.textContent = `Motions · ${motions.length}`;
        section.appendChild(label);
        const row = document.createElement("div");
        row.className = "playback-row";
        for (const m of motions) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.dataset.packId = m.pack_id;
          btn.textContent = m.pack_id;
          btn.setAttribute("aria-pressed", "false");
          btn.addEventListener("click", () => el.playMotion(m.pack_id));
          row.appendChild(btn);
          motionButtonByPackId.set(m.pack_id, btn);
        }
        section.appendChild(row);
        const readout = document.createElement("div");
        readout.className = "playback-readout";
        readout.dataset.testid = "motion-readout";
        readout.innerHTML = 'current: <span data-current="motion">—</span>';
        section.appendChild(readout);
        motionReadoutEl = readout.querySelector('[data-current="motion"]');
        motionSectionEl = section;
      }

      function renderExpressions(expressions) {
        expressionButtonByExpId.clear();
        const section = document.createElement("div");
        section.className = "playback-section";
        section.dataset.testid = "expressions";
        const label = document.createElement("div");
        label.className = "section-label";
        label.textContent = `Expressions · ${expressions.length}`;
        section.appendChild(label);
        const row = document.createElement("div");
        row.className = "playback-row";
        for (const e of expressions) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.dataset.expressionId = e.expression_id;
          btn.textContent = e.name_en;
          btn.setAttribute("aria-pressed", "false");
          btn.addEventListener("click", () => el.setExpression(e.expression_id));
          row.appendChild(btn);
          expressionButtonByExpId.set(e.expression_id, btn);
        }
        // "None" 버튼 — 표정 해제.
        const none = document.createElement("button");
        none.type = "button";
        none.dataset.expressionId = "";
        none.textContent = "None";
        none.setAttribute("aria-pressed", "true");
        none.addEventListener("click", () => el.setExpression(null));
        row.appendChild(none);
        expressionButtonByExpId.set(null, none);
        section.appendChild(row);
        const readout = document.createElement("div");
        readout.className = "playback-readout";
        readout.dataset.testid = "expression-readout";
        readout.innerHTML = 'current: <span data-current="expression">none</span>';
        section.appendChild(readout);
        expressionReadoutEl = readout.querySelector('[data-current="expression"]');
        expressionSectionEl = section;
      }

      el.addEventListener("motionstart", (ev) => {
        const packId = ev.detail.pack_id;
        for (const btn of motionButtonByPackId.values()) btn.setAttribute("aria-pressed", "false");
        const btn = motionButtonByPackId.get(packId);
        if (btn) btn.setAttribute("aria-pressed", "true");
        if (motionReadoutEl) motionReadoutEl.textContent = packId;
      });

      el.addEventListener("expressionchange", (ev) => {
        const id = ev.detail.expression_id;
        for (const btn of expressionButtonByExpId.values()) btn.setAttribute("aria-pressed", "false");
        const btn = expressionButtonByExpId.get(id);
        if (btn) btn.setAttribute("aria-pressed", "true");
        if (expressionReadoutEl) expressionReadoutEl.textContent = id ?? "none";
      });

      el.addEventListener("ready", (ev) => {
        const { manifest, meta } = ev.detail.bundle;
        statusEl.className = "status ok";
        statusEl.textContent = `ready — ${manifest.template_id}@${manifest.template_version} · ${meta.parts.length} parts`;
        avatarNameEl.textContent = manifest.avatar_id ?? manifest.template_id;
        allParameters = meta.parameters;
        allParameterGroups = meta.parameter_groups;
        const groups = categorize(meta.parts);
        renderParts(groups);
        renderParametersFor(null);
        renderMotions(meta.motions);
        renderExpressions(meta.expressions);
        renderInspectorEmpty();
      });

      el.addEventListener("error", (ev) => {
        statusEl.className = "status err";
        statusEl.textContent = `error — ${ev.detail.error?.message ?? ev.detail.error}`;
        console.error(ev.detail.error);
      });

      function swapTemplate(bundleUrl) {
        // β P1-S6 — 템플릿 스왑 시 auto-preview 재실행 허용.
        autoPreviewDone = false;
        statusEl.className = "status";
        statusEl.textContent = "로딩 중…";
        groupsEl.replaceChildren();
        inspectorEl.replaceChildren();
        paramSectionEl = null;
        allParameters = [];
        allParameterGroups = [];
        readoutByIdRef.clear();
        partNodeBySlot.clear();
        motionSectionEl = null;
        expressionSectionEl = null;
        motionButtonByPackId.clear();
        expressionButtonByExpId.clear();
        motionReadoutEl = null;
        expressionReadoutEl = null;
        const hint = document.createElement("p");
        hint.className = "empty-hint";
        hint.textContent = "파츠를 선택하면 slot · role · 소속 그룹이 표시됩니다.";
        inspectorEl.appendChild(hint);
        el.setAttribute("src", bundleUrl);
      }

      // β P2-S1 — 브라우저 Mock 텍스처 생성기. prompt + 현재 atlas 의 slot UV 를 읽어
      // 2048×2048 Canvas 위에 결정론 HSL 블롭을 그린다. hash(prompt + slot_id) → hue,
      // 같은 prompt 는 항상 같은 이미지. 실 nano-banana 경로(β P3+) 로 대체되기 전까지
      // "프롬프트가 실제로 픽셀을 바꾼다" 는 business 약속을 증명한다.
      const MOCK_CANVAS_SIZE = 2048;

      function mockHashHue(key) {
        let h = 2166136261 >>> 0;
        for (let i = 0; i < key.length; i += 1) {
          h ^= key.charCodeAt(i);
          h = Math.imul(h, 16777619);
        }
        return (h >>> 0) % 360;
      }

      // β P2-S2: slot_id 를 역할 카테고리로 분류해 shape 선택. 'skin' → 베이지,
      // 'hair' → 어두운 hair color, 'eye_iris' → prompt hue, 'eye_white' → 흰색 등.
      // 실 벤더 이미지가 합류하는 β P3+ 까지 "프롬프트를 바꾸면 캐릭터가 바뀐다" 를
      // 가능한 avatar-like 하게 Mock 한다.
      function mockCategoryOf(slotId) {
        if (slotId === "face_base" || slotId === "face_shadow" || slotId === "nose") return "skin";
        if (slotId === "cheek_blush") return "blush";
        if (slotId.startsWith("eye_white")) return "eye_white";
        if (slotId.startsWith("eye_iris")) return "eye_iris";
        if (slotId.startsWith("eye_lash_upper")) return "lash_upper";
        if (slotId.startsWith("eye_lash_lower")) return "lash_lower";
        if (slotId.startsWith("brow")) return "brow";
        if (slotId === "mouth_base") return "mouth_lips";
        if (slotId === "mouth_inner") return "mouth_inner";
        if (slotId === "ahoge") return "ahoge";
        if (slotId === "hair_front") return "hair_front";
        if (slotId === "hair_back") return "hair_back";
        if (slotId.startsWith("hair_side")) return "hair_side";
        if (
          slotId === "neck" ||
          slotId === "hip" ||
          slotId.startsWith("arm_") ||
          slotId.startsWith("leg_") ||
          slotId.startsWith("foot_")
        )
          return "skin_body";
        if (
          slotId === "torso" ||
          slotId === "cloth_main" ||
          slotId === "cloth_cape" ||
          slotId === "cloth_skirt"
        )
          return "cloth";
        if (slotId.startsWith("accessory") || slotId === "acc_belt") return "accessory";
        return "generic";
      }

      function mockRoundRect(ctx, x, y, w, h, r) {
        const rr = Math.max(0, Math.min(r, Math.min(w, h) / 2));
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.lineTo(x + w - rr, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
        ctx.lineTo(x + w, y + h - rr);
        ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
        ctx.lineTo(x + rr, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
        ctx.lineTo(x, y + rr);
        ctx.quadraticCurveTo(x, y, x + rr, y);
        ctx.closePath();
      }

      function mockDrawPartShape(ctx, category, x, y, w, h, hueSlot, theme) {
        const cx = x + w / 2;
        const cy = y + h / 2;
        const min = Math.min(w, h);
        switch (category) {
          case "skin": {
            ctx.fillStyle = theme.skin;
            ctx.beginPath();
            ctx.ellipse(cx, cy + h * 0.03, w * 0.46, h * 0.48, 0, 0, Math.PI * 2);
            ctx.fill();
            return;
          }
          case "skin_body": {
            ctx.fillStyle = theme.skin;
            mockRoundRect(ctx, x + w * 0.1, y + h * 0.05, w * 0.8, h * 0.9, min * 0.12);
            ctx.fill();
            return;
          }
          case "blush": {
            ctx.fillStyle = `hsla(${theme.blushHue}, 75%, 76%, 0.82)`;
            ctx.beginPath();
            ctx.ellipse(x + w * 0.2, cy, w * 0.16, h * 0.5, 0, 0, Math.PI * 2);
            ctx.ellipse(x + w * 0.8, cy, w * 0.16, h * 0.5, 0, 0, Math.PI * 2);
            ctx.fill();
            return;
          }
          case "eye_white": {
            ctx.fillStyle = "hsl(0, 0%, 98%)";
            ctx.beginPath();
            ctx.ellipse(cx, cy, w * 0.44, h * 0.36, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "hsla(0, 0%, 45%, 0.45)";
            ctx.lineWidth = Math.max(2, min * 0.03);
            ctx.stroke();
            return;
          }
          case "eye_iris": {
            ctx.fillStyle = `hsl(${theme.eyeHue}, 65%, 42%)`;
            ctx.beginPath();
            ctx.arc(cx, cy, min * 0.36, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "hsl(0, 0%, 8%)";
            ctx.beginPath();
            ctx.arc(cx, cy, min * 0.16, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "hsla(0, 0%, 100%, 0.85)";
            ctx.beginPath();
            ctx.arc(cx - min * 0.1, cy - min * 0.12, min * 0.08, 0, Math.PI * 2);
            ctx.fill();
            return;
          }
          case "lash_upper": {
            ctx.strokeStyle = theme.lashColor;
            ctx.lineWidth = Math.max(3, h * 0.35);
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(x + w * 0.1, y + h * 0.75);
            ctx.quadraticCurveTo(cx, y + h * 0.1, x + w * 0.9, y + h * 0.75);
            ctx.stroke();
            return;
          }
          case "lash_lower": {
            ctx.strokeStyle = `hsla(0, 0%, 20%, 0.6)`;
            ctx.lineWidth = Math.max(2, h * 0.25);
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(x + w * 0.15, y + h * 0.2);
            ctx.quadraticCurveTo(cx, y + h * 0.9, x + w * 0.85, y + h * 0.2);
            ctx.stroke();
            return;
          }
          case "brow": {
            ctx.strokeStyle = theme.browColor;
            ctx.lineWidth = Math.max(4, h * 0.55);
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(x + w * 0.1, y + h * 0.85);
            ctx.quadraticCurveTo(cx, y + h * 0.05, x + w * 0.9, y + h * 0.55);
            ctx.stroke();
            return;
          }
          case "mouth_lips": {
            ctx.strokeStyle = `hsl(350, 55%, 45%)`;
            ctx.lineWidth = Math.max(3, h * 0.18);
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(x + w * 0.2, y + h * 0.45);
            ctx.quadraticCurveTo(cx, y + h * 0.85, x + w * 0.8, y + h * 0.45);
            ctx.stroke();
            return;
          }
          case "mouth_inner": {
            ctx.fillStyle = `hsl(352, 55%, 30%)`;
            ctx.beginPath();
            ctx.ellipse(cx, cy + h * 0.1, w * 0.28, h * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            return;
          }
          case "ahoge": {
            ctx.fillStyle = theme.hair;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.35, y + h * 0.95);
            ctx.quadraticCurveTo(x + w * 0.1, y + h * 0.4, cx, y + h * 0.05);
            ctx.quadraticCurveTo(x + w * 0.9, y + h * 0.4, x + w * 0.65, y + h * 0.95);
            ctx.closePath();
            ctx.fill();
            return;
          }
          case "hair_front": {
            ctx.fillStyle = theme.hair;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.05, y + h * 0.95);
            ctx.lineTo(x + w * 0.05, y + h * 0.4);
            ctx.bezierCurveTo(
              x + w * 0.18, y + h * 0.05,
              x + w * 0.42, y + h * 0.02,
              x + w * 0.5, y + h * 0.12,
            );
            ctx.bezierCurveTo(
              x + w * 0.58, y + h * 0.02,
              x + w * 0.82, y + h * 0.05,
              x + w * 0.95, y + h * 0.4,
            );
            ctx.lineTo(x + w * 0.95, y + h * 0.95);
            ctx.closePath();
            ctx.fill();
            return;
          }
          case "hair_back": {
            ctx.fillStyle = `hsl(${theme.hairHue}, 45%, ${theme.hairLight - 6}%)`;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.04, y + h * 0.98);
            ctx.quadraticCurveTo(x - w * 0.05, y + h * 0.4, x + w * 0.12, y + h * 0.08);
            ctx.quadraticCurveTo(cx, y - h * 0.02, x + w * 0.88, y + h * 0.08);
            ctx.quadraticCurveTo(x + w * 1.05, y + h * 0.4, x + w * 0.96, y + h * 0.98);
            ctx.closePath();
            ctx.fill();
            return;
          }
          case "hair_side": {
            ctx.fillStyle = theme.hair;
            ctx.beginPath();
            ctx.moveTo(x + w * 0.45, y + h * 0.08);
            ctx.bezierCurveTo(
              x + w * 0.15, y + h * 0.25,
              x + w * 0.1, y + h * 0.7,
              x + w * 0.35, y + h * 0.95,
            );
            ctx.lineTo(x + w * 0.75, y + h * 0.92);
            ctx.bezierCurveTo(
              x + w * 0.55, y + h * 0.65,
              x + w * 0.6, y + h * 0.3,
              x + w * 0.55, y + h * 0.08,
            );
            ctx.closePath();
            ctx.fill();
            return;
          }
          case "cloth": {
            ctx.fillStyle = `hsl(${theme.clothHue}, 55%, 48%)`;
            mockRoundRect(ctx, x + w * 0.08, y + h * 0.05, w * 0.84, h * 0.9, min * 0.1);
            ctx.fill();
            ctx.strokeStyle = `hsla(${theme.clothHue}, 65%, 25%, 0.4)`;
            ctx.lineWidth = Math.max(2, min * 0.02);
            ctx.stroke();
            return;
          }
          case "accessory": {
            ctx.fillStyle = `hsla(${hueSlot}, 65%, 58%, 0.6)`;
            mockRoundRect(ctx, x + w * 0.1, y + h * 0.1, w * 0.8, h * 0.8, min * 0.1);
            ctx.fill();
            return;
          }
          default: {
            const grad = ctx.createRadialGradient(cx, cy, min * 0.1, cx, cy, min * 0.6);
            grad.addColorStop(0, `hsla(${hueSlot}, 70%, 72%, 0.85)`);
            grad.addColorStop(1, `hsla(${hueSlot}, 55%, 42%, 0.78)`);
            ctx.fillStyle = grad;
            ctx.fillRect(x, y, w, h);
          }
        }
      }

      // 프롬프트 해시에서 avatar 테마(피부톤·머리색·눈색·옷색) 를 결정론으로 파생.
      function mockThemeFromPrompt(prompt) {
        const base = mockHashHue(prompt || "default");
        return {
          skin: `hsl(${(base + 15) % 360 < 30 || (base + 15) % 360 > 330 ? 30 : 28}, 40%, ${78 + (base % 8)}%)`,
          blushHue: 350 + ((base >> 2) % 10),
          eyeHue: (base + 80) % 360,
          hairHue: (base + 210) % 360,
          hairLight: 24 + (base % 12),
          get hair() {
            return `hsl(${this.hairHue}, 45%, ${this.hairLight}%)`;
          },
          clothHue: (base + 140) % 360,
          browColor: `hsl(${(base + 210) % 360}, 40%, 22%)`,
          lashColor: `hsl(${(base + 210) % 360}, 30%, 14%)`,
        };
      }

      async function mockGenerateTexture(prompt, atlas) {
        const canvas = document.createElement("canvas");
        canvas.width = MOCK_CANVAS_SIZE;
        canvas.height = MOCK_CANVAS_SIZE;
        const ctx = canvas.getContext("2d");
        if (!ctx) throw new Error("Canvas 2D context unavailable");
        const theme = mockThemeFromPrompt(prompt);
        // 투명 배경 — sprite 단위 합성 시 불필요한 배경색이 sprite 사각형에 묻어
        // 파츠 모양을 망치지 않게.
        ctx.clearRect(0, 0, MOCK_CANVAS_SIZE, MOCK_CANVAS_SIZE);

        for (const slot of atlas.slots) {
          const [ux, uy, uw, uh] = slot.uv;
          const x = Math.round(ux * MOCK_CANVAS_SIZE);
          const y = Math.round(uy * MOCK_CANVAS_SIZE);
          const w = Math.max(2, Math.round(uw * MOCK_CANVAS_SIZE));
          const h = Math.max(2, Math.round(uh * MOCK_CANVAS_SIZE));
          const key = `${prompt}::${slot.slot_id}`;
          const hue = mockHashHue(key);
          const category = mockCategoryOf(slot.slot_id);
          ctx.save();
          mockDrawPartShape(ctx, category, x, y, w, h, hue, theme);
          ctx.restore();
        }

        const blob = await new Promise((resolve, reject) => {
          canvas.toBlob((b) => {
            if (b) resolve(b);
            else reject(new Error("canvas.toBlob returned null"));
          }, "image/png");
        });
        const url = URL.createObjectURL(blob);
        return { textureUrl: url, width: MOCK_CANVAS_SIZE, height: MOCK_CANVAS_SIZE };
      }

      // β P2-S1+S3 — Generate 버튼 wiring + phase timing 측정.
      const promptInput = document.querySelector("#prompt-input");
      const generateBtn = document.querySelector("#generate-btn");
      const genStatusEl = document.querySelector("#gen-status");
      const genTimingEl = document.querySelector("#gen-timing");
      const pillEls = Array.from(document.querySelectorAll(".gen-pill"));
      let lastBlobUrl = null;

      // β §7 "≤5000ms prompt→preview" 예산. P2-S3 에서 도입 — 넘으면 UI 에 빨갛게.
      const BETA_BUDGET_MS = 5000;
      const PHASE_LABELS = ["ingest", "synth", "atlas", "swap", "paint"];

      // β P2-S4 — 텔레메트리 훅. phase ms 를 구조화된 console.info("geny.metric", ...)
      // 로 emit. P5 staging 에서 log scraper 가 Prometheus pushgateway 로 변환.
      // window.__genyMetricsSink 가 있으면 그 함수에도 fan-out (테스트·dev 패널용).
      // β P2-S5 — 이벤트 스키마는 `@geny/web-editor-logic` 의 순수 함수
      // `buildGenerateMetricEvents` 로 분리 (node:test 회귀 71 개). 여기선 emit 경로만 얇게.
      function emitMetric(event) {
        try {
          console.info("geny.metric", event);
          const sink = globalThis?.__genyMetricsSink;
          if (typeof sink === "function") sink(event);
        } catch {
          // metric emit 이 실 경로를 깨선 안 됨.
        }
      }

      function emitGenerateMetrics({ trigger, prompt, phaseMs, totalMs, budgetMs, ok, outcome }) {
        const events = buildGenerateMetricEvents({
          ts: Date.now(),
          trigger,
          template: document.querySelector("#template-picker")?.value ?? "unknown",
          prompt,
          phaseMs,
          totalMs,
          budgetMs,
          ok,
        });
        // β P2-S7 — attempts / stop_reason / last_failure_kind 라벨을 total 이벤트에 병합.
        // buildGenerateMetricEvents 는 base labels 만 만들므로 여기서 얹는다.
        const extra = outcome ? attemptOutcomeLabels(outcome) : null;
        for (const e of events) {
          if (extra && e.kind === "generate.total") {
            emitMetric({ ...e, labels: { ...e.labels, ...extra } });
          } else {
            emitMetric(e);
          }
        }
      }

      // β P2-S7 — 재시도 플랜. 5000ms 예산 안에서 1 회 재시도 허용, 첫 실패 후 300ms backoff.
      // Mock 경로에서는 사실상 발동하지 않지만, P3 실 nano-banana 합류 시 vendor
      // 네트워크 블립 (fetch failure, 503, 504) 을 한 번 더 시도해 사용자에게 노출 최소화.
      const GENERATE_PLAN = planGenerateAttempts({
        totalBudgetMs: 5000,
        maxAttempts: 2,
        backoffMs: [300],
      });

      // β P2-S6 — `?debug=metrics` dev 패널. `__genyMetricsSink` 로 이벤트를
      // 200 개 ring buffer 에 쌓고 `summarizeMetricHistory` 집계를 우하단 고정
      // DOM 패널에 반영. Generate 1 회 당 6 이벤트가 들어오므로 200 개는 약
      // 33 회 run 분량 — β 단계 dev inspection 에는 충분.
      if (debugMetricsEnabled) {
        const RING_MAX = 200;
        const ring = [];
        const panel = document.createElement("div");
        panel.id = "debug-metrics-panel";
        panel.setAttribute("aria-label", "debug metrics");
        Object.assign(panel.style, {
          position: "fixed",
          right: "12px",
          bottom: "12px",
          width: "320px",
          maxHeight: "50vh",
          overflow: "auto",
          padding: "10px 12px",
          borderRadius: "8px",
          background: "rgba(16,18,24,0.92)",
          color: "#e6edf6",
          fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace",
          fontSize: "11px",
          lineHeight: "1.4",
          zIndex: "9999",
          boxShadow: "0 4px 16px rgba(0,0,0,0.35)",
          pointerEvents: "auto",
          fontVariantNumeric: "tabular-nums",
        });
        panel.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <strong style="color:#9ab7ff;">geny.metrics</strong>
            <span data-debug="event-count" style="color:#6b7280;">0 ev</span>
          </div>
          <div data-debug="runs" style="margin-bottom:6px;">runs: —</div>
          <div data-debug="budget" style="margin-bottom:6px;">budget: —</div>
          <div data-debug="avg" style="margin-bottom:6px;">avg: — · p95: —</div>
          <div data-debug="phases" style="margin-bottom:6px;">phases: —</div>
          <div data-debug="last-run" style="margin-bottom:6px;color:#9aa1ad;">last: —</div>
        `;
        document.body.appendChild(panel);

        const nodes = {
          events: panel.querySelector('[data-debug="event-count"]'),
          runs: panel.querySelector('[data-debug="runs"]'),
          budget: panel.querySelector('[data-debug="budget"]'),
          avg: panel.querySelector('[data-debug="avg"]'),
          phases: panel.querySelector('[data-debug="phases"]'),
          lastRun: panel.querySelector('[data-debug="last-run"]'),
        };

        function fmtMs(v) {
          return v == null ? "—" : `${Math.round(v)}ms`;
        }

        function rerender() {
          const snap = summarizeMetricHistory(ring);
          nodes.events.textContent = `${snap.eventCount} ev`;
          nodes.runs.textContent = `runs: ${snap.runCount}`;
          const rate = snap.budgetOkRate == null
            ? "—"
            : `${Math.round(snap.budgetOkRate * 100)}%`;
          nodes.budget.textContent = `budget: ${rate} ok (${snap.budgetOkCount}/${snap.runCount}, over=${snap.budgetOverCount})`;
          nodes.avg.textContent = `avg: ${fmtMs(snap.avgTotalMs)} · p95: ${fmtMs(snap.p95TotalMs)}`;
          const phaseKeys = ["ingest", "synth", "atlas", "swap", "paint"];
          const phaseParts = phaseKeys
            .map((k) => `${k} ${fmtMs(snap.phaseAverages[k])}`)
            .join(" · ");
          nodes.phases.textContent = `phases: ${phaseParts}`;
          if (snap.lastRun) {
            const ok = snap.lastRun.budgetOk ? "ok" : "over";
            nodes.lastRun.textContent = `last: ${fmtMs(snap.lastRun.totalMs)} ${ok} · ${snap.lastRun.trigger} · ${snap.lastRun.template} · prompt=${snap.lastRun.promptLen}`;
          } else {
            nodes.lastRun.textContent = "last: —";
          }
        }

        globalThis.__genyMetricsSink = function debugMetricsSink(event) {
          ring.push(event);
          if (ring.length > RING_MAX) ring.splice(0, ring.length - RING_MAX);
          rerender();
        };
        // 테스트·tool 훅: 외부에서 ring buffer / 재렌더 접근 가능 (e2e 검증용).
        globalThis.__genyDebugMetrics = {
          getEvents: () => ring.slice(),
          getSnapshot: () => summarizeMetricHistory(ring),
          clear: () => {
            ring.length = 0;
            rerender();
          },
        };
        rerender();
        console.info("[geny-avatar/metrics] dev panel attached via ?debug=metrics");
      }

      function setPillPhase(index, phase) {
        const el = pillEls[index - 1];
        if (!el) return;
        if (phase) el.setAttribute("data-phase", phase);
        else el.removeAttribute("data-phase");
      }

      function resetPills() {
        for (const p of pillEls) p.removeAttribute("data-phase");
      }

      function renderTimings(phaseMs, totalMs) {
        if (!genTimingEl) return;
        genTimingEl.hidden = false;
        const budget = totalMs <= BETA_BUDGET_MS ? "ok" : "over";
        const phases = phaseMs
          .map((ms, i) => `<span class="phase" title="${PHASE_LABELS[i]}">${PHASE_LABELS[i]} ${Math.round(ms)}ms</span>`)
          .join("");
        genTimingEl.innerHTML = `${phases}<span class="phase total" data-budget="${budget}" title="β §7 budget ≤${BETA_BUDGET_MS}ms">총 ${Math.round(totalMs)}ms</span>`;
      }

      function renderTimingError(phaseMs, totalMs) {
        if (!genTimingEl) return;
        genTimingEl.hidden = false;
        const phases = phaseMs
          .map((ms, i) => `<span class="phase" title="${PHASE_LABELS[i]}">${PHASE_LABELS[i]} ${Math.round(ms)}ms</span>`)
          .join("");
        genTimingEl.innerHTML = `${phases}<span class="phase" style="color:#f0b0b0;">✗ ${Math.round(totalMs)}ms</span>`;
      }

      // β P2-S7 — 단일 attempt 실행 (phase 1~5). 실패 시 throw, 성공 시 { phaseMs }.
      // 재시도 루프는 runGenerate 가 담당.
      async function runGenerateAttempt(prompt, atlas, t0, phaseMs) {
        let tPhase = t0;
        const markPhaseDone = (idx) => {
          const now = performance.now();
          phaseMs[idx - 1] = now - tPhase;
          tPhase = now;
          setPillPhase(idx, "done");
        };
        setPillPhase(1, "active");
        genStatusEl.textContent = "프롬프트 해석";
        await new Promise((r) => setTimeout(r, 30));
        markPhaseDone(1);

        setPillPhase(2, "active");
        genStatusEl.textContent = "텍스처 합성";
        const mock = await mockGenerateTexture(prompt, atlas);
        markPhaseDone(2);

        setPillPhase(3, "active");
        genStatusEl.textContent = "atlas 재구성";
        const newAtlas = {
          textures: [{ path: atlas.textures[0]?.path ?? "textures/base.png", width: mock.width, height: mock.height }],
          slots: atlas.slots,
        };
        markPhaseDone(3);

        setPillPhase(4, "active");
        genStatusEl.textContent = "번들 교체";
        if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
        lastBlobUrl = mock.textureUrl;
        const regenPromise = pixiRenderer.regenerate({
          atlas: newAtlas,
          textureUrl: mock.textureUrl,
        });
        markPhaseDone(4);

        setPillPhase(5, "active");
        genStatusEl.textContent = "렌더 트리거";
        await (regenPromise ?? Promise.resolve());
        markPhaseDone(5);
      }

      async function runGenerate() {
        const prompt = (promptInput?.value ?? "").trim();
        if (!prompt) {
          genStatusEl.textContent = "프롬프트를 입력하세요";
          return;
        }
        if (!pixiRenderer) {
          genStatusEl.textContent = "?renderer=pixi 필요";
          return;
        }
        const atlas = pixiRenderer.lastAtlas;
        if (!atlas) {
          genStatusEl.textContent = "atlas 없음 — 번들 대기";
          return;
        }

        generateBtn.disabled = true;
        resetPills();
        const phaseMs = [0, 0, 0, 0, 0];
        const t0 = performance.now();
        let attemptIndex = 0;
        let lastError = null;
        let lastFailureKind = undefined;
        let stopReason = "success";
        try {
          // eslint-disable-next-line no-constant-condition
          while (true) {
            // 새 attempt 마다 phase pill / phase ms 초기화 (이전 attempt 이 남긴 dial 정리).
            if (attemptIndex > 0) {
              resetPills();
              for (let i = 0; i < phaseMs.length; i += 1) phaseMs[i] = 0;
            }
            try {
              await runGenerateAttempt(prompt, atlas, t0, phaseMs);
              lastError = null;
              break; // 성공
            } catch (err) {
              lastError = err;
              const failure = classifyGenerateFailure(err);
              lastFailureKind = failure.kind;
              const elapsedMs = performance.now() - t0;
              const decision = shouldRetry({
                plan: GENERATE_PLAN,
                failedAttemptIndex: attemptIndex,
                failure,
                elapsedMs,
              });
              if (!decision.retry) {
                stopReason = decision.reason;
                throw err;
              }
              // 재시도 진입 — pill 을 err 로 표시해 첫 실패를 UX 에 남기고, backoff 대기.
              for (let i = 1; i <= 5; i += 1) {
                if (pillEls[i - 1]?.getAttribute("data-phase") === "active") {
                  setPillPhase(i, "err");
                }
              }
              genStatusEl.textContent = `재시도 대기… (${failure.kind}, ${decision.backoffMs}ms)`;
              if (decision.backoffMs > 0) await new Promise((r) => setTimeout(r, decision.backoffMs));
              attemptIndex = decision.nextAttemptIndex;
            }
          }
          // 성공 경로.
          const total = performance.now() - t0;
          const budget = total <= BETA_BUDGET_MS ? "ok" : "over";
          const attempts = attemptIndex + 1;
          const attemptLabel = attempts > 1 ? ` (${attempts} attempts)` : "";
          genStatusEl.textContent = budget === "ok"
            ? `✓ ${Math.round(total)}ms${attemptLabel}`
            : `⚠ ${Math.round(total)}ms (>${BETA_BUDGET_MS})${attemptLabel}`;
          renderTimings(phaseMs, total);
          emitGenerateMetrics({
            trigger: "user",
            prompt,
            phaseMs,
            totalMs: total,
            budgetMs: BETA_BUDGET_MS,
            ok: true,
            outcome: { attempts, ok: true, stopReason: "success" },
          });
        } catch (err) {
          const total = performance.now() - t0;
          console.error("[generate] failed", err);
          const attempts = attemptIndex + 1;
          const kindLabel = lastFailureKind ? ` [${lastFailureKind}]` : "";
          const retryLabel = attempts > 1 ? ` (${attempts} attempts)` : "";
          genStatusEl.textContent = `error${kindLabel}: ${err?.message ?? err}${retryLabel}`;
          for (let i = 1; i <= 5; i += 1) {
            if (pillEls[i - 1]?.getAttribute("data-phase") === "active") {
              setPillPhase(i, "err");
            }
          }
          renderTimingError(phaseMs, total);
          emitGenerateMetrics({
            trigger: "user",
            prompt,
            phaseMs,
            totalMs: total,
            budgetMs: BETA_BUDGET_MS,
            ok: false,
            outcome: {
              attempts,
              ok: false,
              lastFailureKind,
              stopReason,
            },
          });
        } finally {
          generateBtn.disabled = false;
        }
      }

      generateBtn.addEventListener("click", () => void runGenerate());
      promptInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          void runGenerate();
        }
      });
      // 초기 상태 안내: pixi 없으면 미리 알려주기.
      if (!pixiEnabled) {
        genStatusEl.textContent = "?renderer=pixi 필요";
      }

      // β P1-S6 — 초기 로드 때 placeholder PNG (4×4) 를 바로 Mock avatar 로 교체.
      // 사용자가 Generate 를 누르기 전에도 β 데모가 "아바타처럼 보인다".
      // 중복 실행을 막는 플래그 autoPreviewDone 은 상단에서 선언 (swapTemplate 에서 리셋).
      async function runAutoPreview() {
        if (autoPreviewDone) return;
        if (!pixiEnabled || !pixiRenderer) return;
        const atlas = pixiRenderer.lastAtlas;
        if (!atlas) return;
        autoPreviewDone = true;
        const phaseMs = [0, 0, 0, 0, 0];
        const t0 = performance.now();
        let tPhase = t0;
        const currentTemplate = document.querySelector("#template-picker")?.value ?? "halfbody";
        const defaultPrompt = `default · ${currentTemplate}`;
        try {
          phaseMs[0] = 0; // auto 에는 사용자 입력 대기 없음
          tPhase = performance.now();
          const mock = await mockGenerateTexture(defaultPrompt, atlas);
          phaseMs[1] = performance.now() - tPhase;
          tPhase = performance.now();
          const newAtlas = {
            textures: [
              {
                path: atlas.textures[0]?.path ?? "textures/base.png",
                width: mock.width,
                height: mock.height,
              },
            ],
            slots: atlas.slots,
          };
          phaseMs[2] = performance.now() - tPhase;
          tPhase = performance.now();
          if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
          lastBlobUrl = mock.textureUrl;
          const regenPromise = pixiRenderer.regenerate({ atlas: newAtlas, textureUrl: mock.textureUrl });
          phaseMs[3] = performance.now() - tPhase;
          tPhase = performance.now();
          await (regenPromise ?? Promise.resolve());
          phaseMs[4] = performance.now() - tPhase;
          const total = performance.now() - t0;
          console.info("[auto-preview] initial avatar painted for", currentTemplate, `${Math.round(total)}ms`);
          emitGenerateMetrics({
            trigger: "auto",
            prompt: defaultPrompt,
            phaseMs,
            totalMs: total,
            budgetMs: BETA_BUDGET_MS,
            ok: true,
          });
        } catch (err) {
          const total = performance.now() - t0;
          console.warn("[auto-preview] failed", err);
          autoPreviewDone = false;
          emitGenerateMetrics({
            trigger: "auto",
            prompt: defaultPrompt,
            phaseMs,
            totalMs: total,
            budgetMs: BETA_BUDGET_MS,
            ok: false,
          });
        }
      }

      // `<geny-avatar>` ready 이벤트에 훅 — pixi 렌더러가 같은 이벤트에서 captureBundle
      // 로 lastAtlas 를 채우므로, 2 microtask 양보 후 실행해 순서 의존을 회피.
      el.addEventListener("ready", () => {
        queueMicrotask(() => {
          queueMicrotask(() => {
            void runAutoPreview();
          });
        });
      });

      // pixiRenderer 가 dynamic import 로 나중에 attach 될 수 있으므로, 로드 완료 시
      // 이미 bundle 이 ready 상태면 즉시 auto-preview 시도. (race: 1) bundle 먼저 ready
      // → pixi attach 뒤 captureBundle 실행됨 — 이 시점에 catch-up).
      if (pixiEnabled) {
        // 폴링 대신 setInterval 최대 30회(~1.5s) 만 — 이후엔 포기.
        let tries = 0;
        const iv = setInterval(() => {
          tries += 1;
          if (autoPreviewDone || tries >= 30) {
            clearInterval(iv);
            return;
          }
          if (pixiRenderer && pixiRenderer.lastAtlas) {
            clearInterval(iv);
            void runAutoPreview();
          }
        }, 50);
      }

      (async function bootstrap() {
        try {
          const res = await fetch("./public/INDEX.json");
          if (!res.ok) throw new Error(`INDEX.json HTTP ${res.status}`);
          const manifest = await res.json();
          const templates = Array.isArray(manifest.templates) ? manifest.templates : [];
          if (templates.length === 0) throw new Error("INDEX.json.templates is empty");
          pickerEl.replaceChildren();
          for (const t of templates) {
            const opt = document.createElement("option");
            opt.value = t.bundle;
            opt.textContent = t.label ?? t.id;
            pickerEl.appendChild(opt);
          }
          pickerEl.addEventListener("change", () => swapTemplate(pickerEl.value));
          swapTemplate(templates[0].bundle);
        } catch (err) {
          statusEl.className = "status err";
          statusEl.textContent = `bootstrap error — ${err?.message ?? err}`;
          console.error(err);
        }
      })();
    </script>
  </body>
</html>
